<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>SRICART Admin Panel</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#2d5016;--brand2:#4a8024;--accent:#ffd32a;
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --border:#30363d;--border2:#21262d;
  --green:#3fb950;--red:#f85149;--orange:#f0883e;--blue:#58a6ff;--purple:#bc8cff;--yellow:#e3b341;
  --radius:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
input,select,textarea,button{font-family:inherit}

/* ── Login ── */
#loginScreen{display:none;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0a1505,#1a3008)}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:32px 28px;width:100%;max-width:360px;text-align:center}
.login-logo{font-size:40px;margin-bottom:8px}
.login-title{font-size:22px;font-weight:900;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:24px}
.form-input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:14px;outline:none;margin-bottom:10px}
.form-input:focus{border-color:var(--brand2)}
.btn-login{width:100%;padding:13px;border-radius:10px;background:var(--brand);color:#fff;border:none;font-size:14px;font-weight:800;cursor:pointer}
.btn-login:hover{background:var(--brand2)}
.login-err{font-size:12px;color:var(--red);margin-top:8px}

/* ── Header ── */
#dashboard{display:none;flex-direction:column;min-height:100vh}
.admin-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.admin-logo{font-size:18px;font-weight:900;color:var(--green)}
.admin-logo span{color:var(--text)}
.header-right{display:flex;align-items:center;gap:12px}
.admin-email-badge{font-size:11px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:4px 10px}
.btn-logout{padding:6px 14px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:12px;cursor:pointer}
.btn-logout:hover{border-color:var(--red);color:var(--red)}

/* ── Stats ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px 20px}
@media(max-width:600px){.stats-row{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.stat-num{font-size:26px;font-weight:900}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px;font-weight:600}

/* ── Filter Bar ── */
.filter-bar{padding:0 20px 12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.filter-select{padding:8px 14px;border-radius:8px;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:13px;cursor:pointer;outline:none}
.search-input{flex:1;min-width:180px;padding:8px 14px;border-radius:8px;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:13px;outline:none}
.search-input:focus{border-color:var(--brand2)}

/* ── Section Tabs ── */
.section-tabs{display:flex;gap:4px;padding:0 20px 12px;overflow-x:auto;scrollbar-width:none}
.section-tabs::-webkit-scrollbar{display:none}
.stab{flex-shrink:0;padding:7px 14px;border-radius:999px;font-size:12px;font-weight:700;border:1.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:.2s}
.stab:hover{border-color:var(--brand2);color:var(--text)}
.stab.active{background:var(--brand);border-color:var(--brand);color:#fff}
.stab-count{background:rgba(255,255,255,0.2);border-radius:999px;padding:1px 7px;font-size:10px}

/* ── Order Cards ── */
.orders-container{padding:0 20px 80px}
.order-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;transition:.2s}
.order-card:hover{border-color:var(--bg4)}
.order-card-header{padding:14px 16px 10px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;cursor:pointer}
.order-card-left{flex:1;min-width:0}
.order-type-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;margin-bottom:5px}
.otb-order{background:rgba(88,166,255,0.15);color:var(--blue)}
.otb-food{background:rgba(63,185,80,0.15);color:var(--green)}
.otb-booking{background:rgba(188,140,255,0.15);color:var(--purple)}
.order-id{font-size:10px;color:var(--text3);font-family:monospace;margin-bottom:4px}
.order-customer{font-size:15px;font-weight:800;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.order-meta{font-size:11px;color:var(--text2);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.order-card-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.status-pill{padding:4px 10px;border-radius:999px;font-size:10px;font-weight:800;white-space:nowrap;border:1px solid}
.sp-pending{background:rgba(240,136,62,0.15);border-color:rgba(240,136,62,0.3);color:var(--orange)}
.sp-confirmed{background:rgba(88,166,255,0.15);border-color:rgba(88,166,255,0.3);color:var(--blue)}
.sp-packed{background:rgba(188,140,255,0.15);border-color:rgba(188,140,255,0.3);color:var(--purple)}
.sp-out_for_delivery{background:rgba(227,179,65,0.15);border-color:rgba(227,179,65,0.3);color:var(--yellow)}
.sp-delivered{background:rgba(63,185,80,0.15);border-color:rgba(63,185,80,0.3);color:var(--green)}
.sp-cancelled{background:rgba(248,81,73,0.15);border-color:rgba(248,81,73,0.3);color:var(--red)}
.sp-completed{background:rgba(63,185,80,0.15);border-color:rgba(63,185,80,0.3);color:var(--green)}
.order-total{font-size:16px;font-weight:900;color:var(--green)}

.order-card-body{padding:0 16px 14px;display:none;border-top:1px solid var(--border2)}
.order-card-body.open{display:block}

/* Details grid */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
@media(max-width:480px){.detail-grid{grid-template-columns:1fr}}
.detail-cell{background:var(--bg3);border-radius:8px;padding:10px 12px}
.detail-cell.full{grid-column:1/-1}
.dc-label{font-size:9px;color:var(--text3);font-weight:700;letter-spacing:.6px;margin-bottom:4px}
.dc-value{font-size:13px;color:var(--text);font-weight:600;word-break:break-word}
.dc-value a{color:var(--green);text-decoration:none}
.dc-value a:hover{text-decoration:underline}

/* Items table */
.items-table{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
.items-table th{background:var(--bg3);padding:7px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.4px}
.items-table td{padding:8px 10px;border-bottom:1px solid var(--border2);color:var(--text2)}
.items-table tr:last-child td{border-bottom:none}
.items-table .veg-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}

/* Action buttons */
.action-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--border2)}
.action-btn{padding:8px 14px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;transition:.2s;font-family:inherit}
.action-btn:disabled{opacity:0.4;cursor:not-allowed}
.ab-confirm{background:rgba(88,166,255,0.15);border:1px solid rgba(88,166,255,0.3);color:var(--blue)}
.ab-pack{background:rgba(188,140,255,0.15);border:1px solid rgba(188,140,255,0.3);color:var(--purple)}
.ab-dispatch{background:rgba(227,179,65,0.15);border:1px solid rgba(227,179,65,0.3);color:var(--yellow)}
.ab-deliver{background:rgba(63,185,80,0.15);border:1px solid rgba(63,185,80,0.3);color:var(--green)}
.ab-cancel{background:rgba(248,81,73,0.08);border:1px solid rgba(248,81,73,0.25);color:var(--red)}
.ab-wa{background:rgba(37,211,102,0.1);border:1px solid rgba(37,211,102,0.25);color:#25d366}
.ab-call{background:rgba(63,185,80,0.1);border:1px solid rgba(63,185,80,0.25);color:var(--green)}
.assign-input{flex:1;min-width:130px;padding:8px 12px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:12px;outline:none}
.assign-input:focus{border-color:var(--brand2)}

/* Timeline */
.timeline{display:flex;align-items:center;gap:0;margin:12px 0;overflow-x:auto;padding-bottom:2px}
.tl-step{display:flex;flex-direction:column;align-items:center;min-width:60px}
.tl-dot{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:11px;transition:.3s}
.tl-dot.done{border-color:currentColor;background:currentColor;color:#fff;font-size:12px}
.tl-dot.active{box-shadow:0 0 0 3px rgba(255,255,255,0.1)}
.tl-label{font-size:9px;text-align:center;color:var(--text3);margin-top:4px;line-height:1.2;max-width:58px}
.tl-line{flex:1;height:2px;background:var(--border);min-width:10px;margin-bottom:22px}
.tl-line.done{background:var(--green)}

/* Empty / loader */
.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:700;margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--text3)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--brand2);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
#adminToast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;z-index:9999;display:none;min-width:200px;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
</style>
</head>
<body>

<!-- ── Login Screen ── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🛒</div>
    <div class="login-title">SRICART Admin</div>
    <div class="login-sub">Sign in to manage orders & deliveries</div>
    <input class="form-input" type="email" id="adminEmail" placeholder="Admin email" autocomplete="email"/>
    <input class="form-input" type="password" id="adminPass" placeholder="Password"
      onkeydown="if(event.key==='Enter')doAdminLogin()"/>
    <button class="btn-login" onclick="doAdminLogin()">Sign In →</button>
    <div class="login-err" id="loginError"></div>
  </div>
</div>

<!-- ── Dashboard ── -->
<div id="dashboard">

  <!-- Header -->
  <div class="admin-header">
    <div class="admin-logo">SRI<span>CART</span> <span style="font-size:12px;color:var(--text2);font-weight:500">Admin</span></div>
    <div class="header-right">
      <div class="admin-email-badge" id="adminEmailDisplay">—</div>
      <button class="btn-logout" onclick="auth.signOut()">Sign Out</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="statTotal" style="color:var(--blue)">0</div>
      <div class="stat-label">Total Orders</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statNew" style="color:var(--orange)">0</div>
      <div class="stat-label">New / Pending</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statActive" style="color:var(--purple)">0</div>
      <div class="stat-label">In Progress</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statDelivered" style="color:var(--green)">0</div>
      <div class="stat-label">Delivered</div>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <select class="filter-select" id="locFilter" onchange="applyFilters()">
      <option value="All">📍 All Locations</option>
      <option value="Khanapur">Khanapur</option>
      <option value="Bhainsa">Bhainsa</option>
      <option value="Nirmal">Nirmal</option>
      <option value="Mudhole">Mudhole</option>
      <option value="Dilawarpur">Dilawarpur</option>
      <option value="Narsapur">Narsapur</option>
      <option value="Other">Other</option>
    </select>
    <select class="filter-select" id="typeFilter" onchange="applyFilters()">
      <option value="all">All Types</option>
      <option value="order">🛒 Store Orders</option>
      <option value="food_order">🍽️ Food Orders</option>
      <option value="booking">📋 Bookings</option>
    </select>
    <input class="search-input" id="searchInput" placeholder="🔍 Search name, phone, ID…" oninput="applyFilters()"/>
  </div>

  <!-- Section Tabs -->
  <div class="section-tabs">
    <button class="stab active" data-status="all"          onclick="setStatusTab(this)">🗂 All <span class="stab-count" id="tc-all">0</span></button>
    <button class="stab"        data-status="pending"      onclick="setStatusTab(this)">🆕 New <span class="stab-count" id="tc-pending">0</span></button>
    <button class="stab"        data-status="confirmed"    onclick="setStatusTab(this)">✅ Confirmed <span class="stab-count" id="tc-confirmed">0</span></button>
    <button class="stab"        data-status="packed"       onclick="setStatusTab(this)">📦 Packed <span class="stab-count" id="tc-packed">0</span></button>
    <button class="stab"        data-status="out_for_delivery" onclick="setStatusTab(this)">🚀 Out for Delivery <span class="stab-count" id="tc-out_for_delivery">0</span></button>
    <button class="stab"        data-status="delivered"    onclick="setStatusTab(this)">🎉 Delivered <span class="stab-count" id="tc-delivered">0</span></button>
    <button class="stab"        data-status="cancelled"    onclick="setStatusTab(this)">❌ Cancelled <span class="stab-count" id="tc-cancelled">0</span></button>
  </div>

  <!-- Orders List -->
  <div class="orders-container" id="ordersContainer">
    <div class="empty-state"><div class="spinner"></div><div style="margin-top:14px">Loading orders…</div></div>
  </div>

</div>

<div id="adminToast"></div>

<script>
/* ═══════════════════════════════════════════
   FIREBASE INIT
═══════════════════════════════════════════ */
const firebaseConfig = {
  apiKey:"AIzaSyAp-g1syTD9Q8ZRgjdxQDbFF6D9l9zHISY",
  authDomain:"fir-v1-a695a.firebaseapp.com",
  projectId:"fir-v1-a695a",
  storageBucket:"fir-v1-a695a.firebasestorage.app",
  messagingSenderId:"50283321145",
  appId:"1:50283321145:web:94c4c204309c0914ff7ae8"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

/* ═══════════════════════════════════════════
   ADMIN WHITELIST  ← ADD YOUR ADMIN EMAIL(S) HERE
═══════════════════════════════════════════ */
const ADMIN_EMAILS = [
  'ajcart.official@gmail.com',      // ⚠️ Replace with your actual admin email
  'sriltechh@gmail.com' // Add more if needed
];

/* ═══════════════════════════════════════════
   AUTH
═══════════════════════════════════════════ */
function doAdminLogin() {
  const email = document.getElementById('adminEmail').value.trim();
  const pass  = document.getElementById('adminPass').value;
  const errEl = document.getElementById('loginError');
  if (!email || !pass) { errEl.textContent = 'Please enter email and password'; return; }
  errEl.textContent = '';
  auth.signInWithEmailAndPassword(email, pass)
    .catch(err => { errEl.textContent = err.message; });
}

auth.onAuthStateChanged(user => {
  if (user) {
    if (!ADMIN_EMAILS.includes(user.email)) {
      auth.signOut();
      document.getElementById('loginError').textContent = 'Access denied. Admins only.';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
      return;
    }
    document.getElementById('loginScreen').style.display  = 'none';
    document.getElementById('dashboard').style.display   = 'flex';
    document.getElementById('adminEmailDisplay').textContent = user.email;
    startListeners();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display   = 'none';
    stopListeners();
  }
});

/* ═══════════════════════════════════════════
   DATA LAYER — listen to all 3 collections
═══════════════════════════════════════════ */
let _allOrders    = [];
let _unsubs       = [];
let _activeStatus = 'all';

function startListeners() {
  stopListeners();
  let _ordersData=[], _bookingsData=[], _foodData=[];

  function merge() {
    _allOrders = [..._ordersData, ..._bookingsData, ..._foodData]
      .sort((a,b)=>(b._ts||0)-(a._ts||0));
    updateStats();
    applyFilters();
  }

  const u1 = db.collection('orders')
    .orderBy('createdAt','desc').limit(200)
    .onSnapshot(snap=>{
      _ordersData = snap.docs.map(d=>({ id:d.id, _col:'orders', _type:'order', _ts:d.data().createdAt?.seconds||0, ...d.data() }));
      merge();
    }, err=>console.warn('orders err:',err));

  const u2 = db.collection('bookings')
    .orderBy('createdAt','desc').limit(200)
    .onSnapshot(snap=>{
      _bookingsData = snap.docs.map(d=>({ id:d.id, _col:'bookings', _type:'booking', _ts:d.data().createdAt?.seconds||0, ...d.data() }));
      merge();
    }, err=>console.warn('bookings err:',err));

  const u3 = db.collection('food_orders')
    .orderBy('createdAt','desc').limit(200)
    .onSnapshot(snap=>{
      _foodData = snap.docs.map(d=>({ id:d.id, _col:'food_orders', _type:'food_order', _ts:d.data().createdAt?.seconds||0, ...d.data() }));
      merge();
    }, err=>console.warn('food_orders err:',err));

  _unsubs = [u1,u2,u3];
}

function stopListeners() { _unsubs.forEach(u=>u&&u()); _unsubs=[]; }

/* ═══════════════════════════════════════════
   STATS
═══════════════════════════════════════════ */
function updateStats() {
  const counts = { all:0, pending:0, confirmed:0, packed:0, out_for_delivery:0, delivered:0, cancelled:0, completed:0 };
  _allOrders.forEach(o => {
    counts.all++;
    const s = o.status||'pending';
    if (counts[s] !== undefined) counts[s]++;
  });

  const inProgress = (counts.confirmed||0)+(counts.packed||0)+(counts.out_for_delivery||0);
  document.getElementById('statTotal').textContent     = counts.all;
  document.getElementById('statNew').textContent       = counts.pending||0;
  document.getElementById('statActive').textContent    = inProgress;
  document.getElementById('statDelivered').textContent = (counts.delivered||0)+(counts.completed||0);

  // Tab counts
  Object.keys(counts).forEach(k=>{
    const el = document.getElementById('tc-'+k);
    if (el) el.textContent = counts[k];
  });
}

/* ═══════════════════════════════════════════
   FILTER & RENDER
═══════════════════════════════════════════ */
function setStatusTab(el) {
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  _activeStatus = el.dataset.status;
  applyFilters();
}

function applyFilters() {
  const loc    = document.getElementById('locFilter')?.value   || 'All';
  const type   = document.getElementById('typeFilter')?.value  || 'all';
  const search = (document.getElementById('searchInput')?.value||'').toLowerCase();

  let list = _allOrders;

  if (_activeStatus !== 'all')
    list = list.filter(o => (o.status||'pending') === _activeStatus);
  if (loc !== 'All')
    list = list.filter(o => (o.serviceArea||o.location||o.restaurantLocation||'').toLowerCase() === loc.toLowerCase());
  if (type !== 'all')
    list = list.filter(o => o._type === type);
  if (search)
    list = list.filter(o =>
      (o.name||'').toLowerCase().includes(search) ||
      (o.phone||'').includes(search) ||
      (o.id||'').toLowerCase().includes(search) ||
      (o.restaurantName||'').toLowerCase().includes(search) ||
      (o.address||'').toLowerCase().includes(search)
    );

  renderOrders(list);
}

/* ═══════════════════════════════════════════
   RENDER ORDER CARDS
═══════════════════════════════════════════ */
function renderOrders(list) {
  const container = document.getElementById('ordersContainer');
  if (!list.length) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📭</div>
      <div class="empty-title">No orders found</div>
      <div class="empty-sub">Try changing filters or wait for new orders</div>
    </div>`;
    return;
  }

  container.innerHTML = list.map(o => renderOrderCard(o)).join('');
}

function renderOrderCard(o) {
  const st = o.status || 'pending';
  const isCancelled = st === 'cancelled';
  const dt = o.createdAt
    ? new Date(o.createdAt.seconds*1000).toLocaleString('en-IN',{dateStyle:'medium',timeStyle:'short'})
    : o.createdDate ? `${o.createdDate} ${o.createdTime||''}` : '—';

  const statusLabels = {
    pending:'🆕 Pending', confirmed:'✅ Confirmed', packed:'📦 Packed',
    out_for_delivery:'🚀 Out for Delivery', delivered:'🎉 Delivered',
    cancelled:'❌ Cancelled', completed:'✅ Completed', request_sent:'📝 Request Sent'
  };

  const typeInfo = {
    order:     { label:'🛒 Store Order',  cls:'otb-order'   },
    food_order:{ label:'🍽️ Food Order',  cls:'otb-food'    },
    booking:   { label:'📋 Booking',      cls:'otb-booking' },
  };
  const ti = typeInfo[o._type] || typeInfo.order;

  // Timeline statuses
  const STORE_TL  = ['pending','confirmed','packed','out_for_delivery','delivered'];
  const FOOD_TL   = ['pending','confirmed','packed','out_for_delivery','delivered'];
  const BOOK_TL   = ['pending','confirmed','completed'];
  const tlSteps   = o._type === 'booking' ? BOOK_TL : (o._type === 'food_order' ? FOOD_TL : STORE_TL);
  const tlLabels  = {
    pending:'Order Placed', confirmed:'Confirmed', packed:'Packed',
    out_for_delivery:'Out for Delivery', delivered:'Delivered',
    completed:'Completed'
  };
  const tlIcons = {
    pending:'📝', confirmed:'✅', packed:'📦', out_for_delivery:'🚀', delivered:'🎉', completed:'🎉'
  };
  const curIdx = tlSteps.indexOf(st);

  const timelineHtml = isCancelled
    ? `<div style="color:var(--red);font-size:12px;font-weight:700;padding:8px 0">✖ Order Cancelled${o.cancelledAt?` — ${new Date(o.cancelledAt.seconds*1000).toLocaleString('en-IN',{dateStyle:'short',timeStyle:'short'})}`:''}</div>`
    : `<div class="timeline">${tlSteps.map((s,i)=>{
        const done   = i<=curIdx && !isCancelled;
        const active = i===curIdx && !isCancelled;
        const color  = done ? (s==='delivered'||s==='completed'?'#3fb950': s==='out_for_delivery'?'#e3b341': s==='packed'?'#bc8cff':'#58a6ff') : '';
        return `
        <div class="tl-step">
          <div class="tl-dot${done?' done':''}${active?' active':''}" style="${done?`color:${color};background:${color};border-color:${color}`:''}">
            ${done ? tlIcons[s] : '○'}
          </div>
          <div class="tl-label" style="${done?`color:${color}`:''}">
            ${tlLabels[s]||s}
            ${done&&o[s+'At']?`<br><span style="font-size:8px;opacity:.7">${new Date(o[s+'At'].seconds*1000).toLocaleString('en-IN',{timeStyle:'short'})}</span>`:''}
          </div>
        </div>
        ${i<tlSteps.length-1?`<div class="tl-line${i<curIdx&&!isCancelled?' done':''}"></div>`:''}`;
      }).join('')}</div>`;

  // Items table
  const itemsHtml = (o.items && o.items.length)
    ? `<table class="items-table">
        <thead><tr><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead>
        <tbody>${o.items.map(i=>`
          <tr>
            <td>${o._type==='food_order'?`<span class="veg-dot" style="background:${i.veg?'#3fb950':'#f85149'}"></span>`:''}${i.name}</td>
            <td>${i.qtyRaw||i.qty||1}</td>
            <td>${i.price>0?'₹'+i.price:'—'}</td>
            <td>${i.total>0?'₹'+i.total:i.price>0?'₹'+i.price*(i.qty||1):'—'}</td>
          </tr>`).join('')}
          ${o.total>0?`<tr style="font-weight:800;color:var(--green)"><td colspan="3">Grand Total</td><td>₹${o.total.toLocaleString('en-IN')}</td></tr>`:''}
        </tbody>
      </table>` : '';

  // Action buttons based on current status
  const actionHtml = buildActionButtons(o);

  return `<div class="order-card" id="card-${o.id}">
    <div class="order-card-header" onclick="toggleCard('${o.id}')">
      <div class="order-card-left">
        <div><span class="order-type-badge ${ti.cls}">${ti.label}</span></div>
        <div class="order-id">#${o.id.substring(0,12).toUpperCase()} · ${dt}</div>
        <div class="order-customer">${o.name||'—'}</div>
        <div class="order-meta">
          ${o.phone?`<span>📱 ${o.phone}</span>`:''}
          ${o.serviceArea||o.location||o.restaurantLocation?`<span>📍 ${o.serviceArea||o.location||o.restaurantLocation}</span>`:''}
          ${o.restaurantName?`<span>🍽️ ${o.restaurantName}</span>`:''}
          ${o.itemCount||o.items?.length?`<span>📦 ${o.itemCount||o.items?.length} item(s)</span>`:''}
        </div>
      </div>
      <div class="order-card-right">
        <div class="status-pill sp-${st}">${statusLabels[st]||st}</div>
        ${o.total>0?`<div class="order-total">₹${o.total.toLocaleString('en-IN')}</div>`:''}
      </div>
    </div>

    <div class="order-card-body" id="body-${o.id}">
      <!-- Timeline -->
      ${timelineHtml}

      <!-- All Details -->
      <div class="detail-grid">
        <div class="detail-cell"><div class="dc-label">ORDER ID</div><div class="dc-value" style="font-family:monospace">${o.id}</div></div>
        <div class="detail-cell"><div class="dc-label">DATE & TIME</div><div class="dc-value">${dt}</div></div>
        ${o.name?`<div class="detail-cell"><div class="dc-label">CUSTOMER NAME</div><div class="dc-value">${o.name}</div></div>`:''}
        ${o.phone?`<div class="detail-cell"><div class="dc-label">MOBILE</div><div class="dc-value"><a href="tel:+91${o.phone}">📱 ${o.phone}</a></div></div>`:''}
        ${o.userEmail?`<div class="detail-cell"><div class="dc-label">EMAIL</div><div class="dc-value">${o.userEmail}</div></div>`:''}
        ${o.address?`<div class="detail-cell full"><div class="dc-label">DELIVERY ADDRESS</div><div class="dc-value">📍 ${o.address}</div></div>`:''}
        ${o.serviceArea||o.location?`<div class="detail-cell"><div class="dc-label">SERVICE AREA</div><div class="dc-value">${o.serviceArea||o.location}</div></div>`:''}
        ${o.restaurantName?`<div class="detail-cell"><div class="dc-label">RESTAURANT</div><div class="dc-value">🍽️ ${o.restaurantName}</div></div>`:''}
        ${o.restaurantAddress?`<div class="detail-cell"><div class="dc-label">REST. ADDRESS</div><div class="dc-value">${o.restaurantAddress}</div></div>`:''}
        ${o.total>0?`<div class="detail-cell"><div class="dc-label">ORDER TOTAL</div><div class="dc-value" style="color:var(--green);font-size:18px;font-weight:900">₹${o.total.toLocaleString('en-IN')}</div></div>`:''}
        ${o.assignedRiderName?`<div class="detail-cell"><div class="dc-label">ASSIGNED RIDER</div><div class="dc-value" style="color:var(--purple)">🛵 ${o.assignedRiderName}</div></div>`:''}
        ${o.instructions?`<div class="detail-cell full"><div class="dc-label">INSTRUCTIONS</div><div class="dc-value">📝 ${o.instructions}</div></div>`:''}
        ${o.giftMsg?`<div class="detail-cell full"><div class="dc-label">GIFT MESSAGE</div><div class="dc-value">🎁 ${o.giftMsg}</div></div>`:''}
        ${o.gpsMapLink?`<div class="detail-cell full"><div class="dc-label">GPS LOCATION</div><div class="dc-value"><a href="${o.gpsMapLink}" target="_blank">🗺️ Open in Google Maps</a></div></div>`:''}
        ${o.userId?`<div class="detail-cell"><div class="dc-label">USER ID</div><div class="dc-value" style="font-family:monospace;font-size:11px">${o.userId}</div></div>`:''}
        ${o.appUrl?`<div class="detail-cell full"><div class="dc-label">APP URL (at order time)</div><div class="dc-value" style="font-size:11px;word-break:break-all">${o.appUrl}</div></div>`:''}
      </div>

      <!-- Items table -->
      ${itemsHtml}

      <!-- Booking fields if booking -->
      ${o._type==='booking'&&o.fields?`<div style="margin:8px 0">
        ${Object.entries(o.fields).map(([k,v])=>`
          <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border2);font-size:12px">
            <span style="color:var(--text3)">${k}</span><span>${v}</span>
          </div>`).join('')}
      </div>`:''}

      <!-- Action buttons -->
      <div class="action-row">
        ${actionHtml}
      </div>

      <!-- Assign Rider -->
      ${!['delivered','cancelled','completed'].includes(st)?`
      <div style="display:flex;gap:8px;margin-top:10px">
        <input class="assign-input" id="rider-${o.id}"
          placeholder="Rider name" value="${o.assignedRiderName||''}"/>
        <button class="action-btn ab-dispatch" onclick="assignRider('${o.id}','${o._col}')">
          🛵 Assign
        </button>
      </div>`:''}
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════
   ACTION BUTTONS
═══════════════════════════════════════════ */
function buildActionButtons(o) {
  const st = o.status || 'pending';
  const id = o.id;
  const col = o._col;
  const phone = o.phone || '';
  const name  = o.name  || 'Customer';
  const isBooking = o._type === 'booking';

  const btns = [];

  // WhatsApp & Call always visible
  if (phone) {
    const waText = encodeURIComponent(`Hi ${name}! Your SRICART order #${id.substring(0,8)} update:`);
    btns.push(`<a class="action-btn ab-wa" href="https://wa.me/91${phone}?text=${waText}" target="_blank">💬 WhatsApp</a>`);
    btns.push(`<a class="action-btn ab-call" href="tel:+91${phone}">📞 Call</a>`);
  }

  if (!['cancelled','delivered','completed'].includes(st)) {
    if (st === 'pending' || st === 'request_sent')
      btns.push(`<button class="action-btn ab-confirm" onclick="updateStatus('${id}','${col}','confirmed')">✅ Confirm</button>`);
    if (st === 'confirmed' && !isBooking)
      btns.push(`<button class="action-btn ab-pack" onclick="updateStatus('${id}','${col}','packed')">📦 Mark Packed</button>`);
    if (st === 'packed')
      btns.push(`<button class="action-btn ab-dispatch" onclick="updateStatus('${id}','${col}','out_for_delivery')">🚀 Dispatch</button>`);
    if (st === 'out_for_delivery' || st === 'confirmed')
      btns.push(`<button class="action-btn ab-deliver" onclick="updateStatus('${id}','${col}','${isBooking?'completed':'delivered'}')">🎉 ${isBooking?'Complete':'Delivered'}</button>`);

    btns.push(`<button class="action-btn ab-cancel" onclick="cancelOrder('${id}','${col}')">❌ Cancel</button>`);
  }

  return btns.join('');
}

/* ═══════════════════════════════════════════
   STATUS UPDATES
═══════════════════════════════════════════ */
function updateStatus(id, col, newStatus) {
  const now = firebase.firestore.FieldValue.serverTimestamp();
  const nowISO = new Date().toISOString();

  const update = {
    status: newStatus,
    [`${newStatus}At`]: now,
    updatedAt: now,
    updatedAtISO: nowISO,
    statusHistory: firebase.firestore.FieldValue.arrayUnion({
      status: newStatus,
      time: nowISO,
      by: 'admin'
    })
  };

  db.collection(col).doc(id).update(update)
    .then(() => showAdminToast(`✅ Status updated to: ${newStatus}`))
    .catch(err => showAdminToast('❌ Error: ' + err.message));
}

function cancelOrder(id, col) {
  if (!confirm('Cancel this order?')) return;
  updateStatus(id, col, 'cancelled');
}

function assignRider(id, col) {
  const riderName = (document.getElementById('rider-'+id)?.value||'').trim();
  if (!riderName) { showAdminToast('Enter rider name first'); return; }
  db.collection(col).doc(id).update({
    assignedRiderName: riderName,
    assignedAt: firebase.firestore.FieldValue.serverTimestamp(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(()=>showAdminToast('🛵 Rider assigned: '+riderName))
    .catch(err=>showAdminToast('❌ '+err.message));
}

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function toggleCard(id) {
  const body = document.getElementById('body-'+id);
  if (!body) return;
  body.classList.toggle('open');
}

function showAdminToast(msg) {
  const t = document.getElementById('adminToast');
  if (!t) return;
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._t);
  t._t = setTimeout(()=>{ t.style.display='none'; }, 3000);
}
</script>
</body>
</html>
