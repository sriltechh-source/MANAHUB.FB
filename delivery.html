<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>SRICART — Delivery Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --brand:#2d5016;--brand2:#4a8024;--brand3:#6aad2e;--accent:#a8e063;
  --bg:#061008;--bg2:#0c1a0e;--bg3:#112014;
  --glass:rgba(45,80,22,0.12);--glass2:rgba(45,80,22,0.18);--glass3:rgba(45,80,22,0.28);
  --glow:rgba(106,173,46,0.15);--glow2:rgba(106,173,46,0.28);
  --border:rgba(106,173,46,0.14);--border2:rgba(106,173,46,0.24);--border3:rgba(106,173,46,0.40);
  --text:#e8f5e3;--text2:#9dc98a;--text3:#5a8050;
  --green:#6aad2e;--red:#ff5c5c;--orange:#ff9800;--yellow:#ffd54f;--blue:#44c9ff;--purple:#c084fc;
}
body{
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;max-width:480px;margin:0 auto;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 10% 0%,rgba(45,80,22,0.4) 0%,transparent 50%),
    radial-gradient(ellipse at 90% 100%,rgba(74,128,36,0.2) 0%,transparent 55%);
  pointer-events:none;z-index:0;
}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border3);border-radius:3px}
input,button{font-family:inherit}

/* ════ LOGIN ════ */
.login-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:24px;position:relative;z-index:1;
}
.login-card{
  background:rgba(12,26,14,0.75);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border:1px solid var(--border3);border-radius:28px;
  padding:40px 28px;width:100%;
  box-shadow:0 0 60px var(--glow),0 30px 80px rgba(0,0,0,0.6),inset 0 1px 0 rgba(168,224,99,0.1);
  position:relative;overflow:hidden;
}
.login-card::before{
  content:'';position:absolute;top:-50px;right:-50px;
  width:160px;height:160px;
  background:radial-gradient(circle,rgba(106,173,46,0.12),transparent 70%);
  pointer-events:none;
}
.login-logo{text-align:center;margin-bottom:14px}
.login-logo-icon{
  width:64px;height:64px;
  background:linear-gradient(135deg,var(--brand),var(--brand3));
  border-radius:18px;display:inline-flex;align-items:center;justify-content:center;
  font-size:30px;box-shadow:0 0 32px var(--glow2);
}
.login-title{
  text-align:center;font-size:22px;font-weight:900;
  background:linear-gradient(135deg,var(--accent),var(--brand3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin:10px 0 4px;
}
.login-sub{text-align:center;font-size:13px;color:var(--text3);margin-bottom:26px}
.form-input{
  width:100%;background:var(--glass);border:1px solid var(--border2);
  border-radius:12px;padding:13px 16px;font-size:14px;color:var(--text);
  outline:none;margin-bottom:12px;transition:.2s;
}
.form-input:focus{border-color:var(--border3);background:var(--glass2);box-shadow:0 0 0 3px var(--glow)}
.form-input::placeholder{color:var(--text3)}
.btn-login{
  width:100%;padding:14px;border:none;border-radius:12px;
  font-size:14px;font-weight:800;cursor:pointer;
  background:linear-gradient(135deg,var(--brand),var(--brand3));color:#fff;
  box-shadow:0 4px 20px var(--glow2);transition:.2s;letter-spacing:.3px;
}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 28px var(--glow2)}
.btn-login:active{transform:scale(.98)}
.error-msg{color:var(--red);font-size:12px;text-align:center;margin-top:8px;min-height:18px}

/* ════ DASHBOARD ════ */
.dashboard{display:none;position:relative;z-index:1;padding-bottom:72px}

/* ════ HEADER ════ */
.header{
  background:rgba(6,16,8,0.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border2);
  padding:0 16px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.header-left{display:flex;align-items:center;gap:10px}
.header-logo{
  width:38px;height:38px;
  background:linear-gradient(135deg,var(--brand),var(--brand3));
  border-radius:11px;display:flex;align-items:center;justify-content:center;
  font-size:20px;box-shadow:0 2px 12px var(--glow);
}
.header-title{font-size:15px;font-weight:800;color:var(--text)}
.header-sub{font-size:11px;color:var(--text3)}
.logout-btn{
  background:rgba(255,92,92,0.12);border:1px solid rgba(255,92,92,0.3);
  color:var(--red);padding:7px 13px;border-radius:9px;
  cursor:pointer;font-size:12px;font-weight:700;transition:.2s;
}
.logout-btn:hover{background:rgba(255,92,92,0.2)}

/* ════ ONLINE BAR ════ */
.online-bar{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
  background:var(--glass2);border-bottom:1px solid var(--border);
}
.online-label{flex:1;font-size:13px;font-weight:700}
.toggle-wrap{position:relative;width:50px;height:26px;cursor:pointer}
.toggle-wrap input{opacity:0;width:0;height:0}
.toggle-slider{
  position:absolute;inset:0;
  background:rgba(90,128,80,0.2);border:1px solid var(--border2);
  border-radius:26px;transition:.3s;
}
.toggle-slider:before{
  content:'';position:absolute;height:20px;width:20px;
  left:3px;bottom:2px;background:var(--text3);
  border-radius:50%;transition:.3s;
}
input:checked+.toggle-slider{background:rgba(106,173,46,0.25);border-color:var(--border3)}
input:checked+.toggle-slider:before{transform:translateX(22px);background:var(--green);box-shadow:0 0 8px var(--glow2)}

/* ════ GPS BAR ════ */
.gps-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;background:var(--glass);border-bottom:1px solid var(--border);
}
.gps-info{display:flex;align-items:center;gap:8px}
.gps-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.gps-dot.active{background:var(--green);box-shadow:0 0 8px var(--glow2);animation:gpsPulse 2s infinite}
.gps-dot.inactive{background:var(--text3)}
@keyframes gpsPulse{0%,100%{opacity:1}50%{opacity:.4}}
.gps-text{font-size:12px;font-weight:700;color:var(--text2)}
.gps-coords{font-size:10px;color:var(--text3);font-family:monospace}
.gps-update-btn{
  background:rgba(68,201,255,0.12);border:1px solid rgba(68,201,255,0.3);
  color:var(--blue);padding:7px 13px;border-radius:9px;
  font-size:11px;font-weight:800;cursor:pointer;transition:.2s;
}
.gps-update-btn:hover{background:rgba(68,201,255,0.2)}

/* ════ STATS ════ */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 14px}
.stat-card{
  background:var(--glass2);backdrop-filter:blur(16px);
  border:1px solid var(--border);border-radius:14px;
  padding:14px 10px;text-align:center;
  position:relative;overflow:hidden;
}
.stat-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(168,224,99,0.04),transparent);pointer-events:none}
.stat-num{font-size:26px;font-weight:900;line-height:1}
.stat-label{font-size:10px;color:var(--text2);margin-top:5px;font-weight:700;letter-spacing:.3px}

/* ════ TAB BAR ════ */
.tab-bar{
  display:flex;background:var(--glass2);
  border-bottom:1px solid var(--border);
}
.tab{
  flex:1;padding:13px 6px;text-align:center;
  font-size:11px;font-weight:700;cursor:pointer;
  color:var(--text3);border-bottom:2px solid transparent;transition:.2s;
}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ════ SECTION TITLE ════ */
.section-title{
  font-size:14px;font-weight:800;color:var(--text);
  padding:14px 14px 8px;
  display:flex;align-items:center;justify-content:space-between;
}
.section-count{
  font-size:12px;
  background:rgba(106,173,46,0.18);color:var(--green);
  border:1px solid rgba(106,173,46,0.3);
  padding:2px 9px;border-radius:999px;font-weight:800;
}

/* ════ ORDER CARDS ════ */
.order-card{
  background:var(--glass2);backdrop-filter:blur(12px);
  border:1px solid var(--border);border-radius:16px;
  margin:0 12px 12px;overflow:hidden;transition:.2s;
}
.order-card:active{transform:scale(.99)}
.order-card-top{
  padding:13px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;gap:8px;
}
.order-name{font-size:15px;font-weight:800;color:var(--text)}
.order-meta{font-size:11px;color:var(--text3);margin-top:3px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:999px;font-size:10px;font-weight:800}
.badge-confirmed{background:rgba(68,201,255,0.15);color:var(--blue);border:1px solid rgba(68,201,255,0.3)}
.badge-packed{background:rgba(192,132,252,0.15);color:var(--purple);border:1px solid rgba(192,132,252,0.3)}
.badge-out_for_delivery{background:rgba(106,173,46,0.15);color:var(--green);border:1px solid rgba(106,173,46,0.3)}
.badge-delivered{background:rgba(106,173,46,0.15);color:var(--green);border:1px solid rgba(106,173,46,0.3)}

.order-body{padding:12px 14px}
.order-items{font-size:12px;color:var(--text2);line-height:1.7;background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:9px 11px;margin-bottom:10px}
.order-address{display:flex;gap:6px;font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.5}
.order-instructions{font-size:11px;color:var(--text3);background:rgba(255,213,79,0.06);border:1px solid rgba(255,213,79,0.2);border-radius:8px;padding:8px 11px;margin-bottom:10px}
.order-actions{display:flex;gap:6px;flex-wrap:wrap}
.act-btn{
  flex:1;min-width:80px;padding:12px 8px;
  border:none;border-radius:12px;
  font-size:12px;font-weight:800;cursor:pointer;
  transition:.2s;text-align:center;text-decoration:none;
  display:inline-flex;align-items:center;justify-content:center;
}
.act-btn:active{transform:scale(.97)}
.act-start{background:rgba(255,152,0,0.15);border:1px solid rgba(255,152,0,0.35);color:var(--orange)}
.act-start:hover{background:rgba(255,152,0,0.25)}
.act-deliver{background:rgba(106,173,46,0.15);border:1px solid rgba(106,173,46,0.35);color:var(--green)}
.act-deliver:hover{background:rgba(106,173,46,0.25)}
.act-call{background:var(--glass);border:1px solid var(--border2);color:var(--text2)}
.act-call:hover{background:var(--glass2)}
.act-map{background:rgba(68,201,255,0.12);border:1px solid rgba(68,201,255,0.3);color:var(--blue)}
.act-map:hover{background:rgba(68,201,255,0.2)}

/* ════ NEW ORDER ALERT ════ */
.new-order-alert{
  display:none;margin:10px 12px;
  background:rgba(106,173,46,0.12);
  border:1px solid rgba(106,173,46,0.4);
  border-radius:14px;padding:12px 14px;
  align-items:center;gap:10px;
  animation:alertPulse 2s infinite;
}
.new-order-alert.show{display:flex}
@keyframes alertPulse{0%,100%{box-shadow:0 0 0 0 rgba(106,173,46,0.4)}50%{box-shadow:0 0 0 8px rgba(106,173,46,0)}}

/* ════ EMPTY STATE ════ */
.empty-state{text-align:center;padding:50px 20px}
.empty-icon{font-size:46px;margin-bottom:12px}
.empty-title{font-size:14px;font-weight:800;color:var(--text2);margin-bottom:6px}
.empty-sub{font-size:12px;color:var(--text3)}

/* ════ BOTTOM NAV ════ */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  background:rgba(6,16,8,0.92);backdrop-filter:blur(24px);
  border-top:1px solid var(--border2);
  display:flex;height:62px;z-index:100;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  cursor:pointer;color:var(--text3);font-size:10px;font-weight:700;transition:.2s;
}
.nav-item.active{color:var(--accent)}
.nav-item svg{width:20px;height:20px}

/* ════ HISTORY CARD ════ */
.history-card{
  background:var(--glass);border:1px solid var(--border);
  border-radius:12px;margin:0 12px 8px;padding:12px 14px;
  display:flex;align-items:center;gap:12px;
}
.history-check{
  width:38px;height:38px;border-radius:11px;
  background:rgba(106,173,46,0.12);border:1px solid rgba(106,173,46,0.3);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
}

/* ════ TOAST ════ */
.toast{
  position:fixed;top:70px;left:50%;
  transform:translateX(-50%) translateY(-10px);
  background:var(--glass3);backdrop-filter:blur(24px);
  border:1px solid var(--border3);border-radius:12px;
  padding:12px 20px;font-size:13px;font-weight:700;color:var(--text);
  z-index:500;opacity:0;transition:.3s;
  pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:rgba(106,173,46,0.5);color:var(--green)}
.toast.error{border-color:rgba(255,92,92,0.5);color:var(--red)}

/* ════ FLOAT CALL ════ */
.float-call{
  position:fixed;bottom:74px;right:16px;
  width:52px;height:52px;
  background:linear-gradient(135deg,var(--brand),var(--brand3));
  border-radius:16px;display:flex;align-items:center;justify-content:center;
  font-size:22px;
  box-shadow:0 4px 20px var(--glow2);z-index:90;text-decoration:none;transition:.2s;
}
.float-call:active{transform:scale(.95)}
</style>
</head>
<body>

<!-- ════════════════════ LOGIN ════════════════════ -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo"><div class="login-logo-icon">🛵</div></div>
    <div class="login-title">Delivery Portal</div>
    <div class="login-sub">SRICART — Rider Login</div>
    <input class="form-input" type="email" id="dbEmail" placeholder="Your email address" autocomplete="email"/>
    <input class="form-input" type="password" id="dbPass" placeholder="Password" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')dbLogin()"/>
    <button class="btn-login" onclick="dbLogin()">Sign In →</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<!-- ════════════════════ DASHBOARD ════════════════════ -->
<div class="dashboard" id="dashboard">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="header-logo">🛵</div>
      <div>
        <div class="header-title">Delivery Dashboard</div>
        <div class="header-sub" id="dbEmailDisplay">—</div>
      </div>
    </div>
    <button class="logout-btn" onclick="dbLogout()">Logout</button>
  </div>

  <!-- Online Toggle -->
  <div class="online-bar">
    <span class="online-label" id="onlineLabel">🔴 You are Offline</span>
    <label class="toggle-wrap">
      <input type="checkbox" id="onlineToggle" onchange="toggleOnline()"/>
      <span class="toggle-slider"></span>
    </label>
  </div>

  <!-- GPS Bar -->
  <div class="gps-bar">
    <div class="gps-info">
      <div class="gps-dot inactive" id="gpsDot"></div>
      <div>
        <div class="gps-text" id="gpsStatus">GPS not active</div>
        <div class="gps-coords" id="gpsCoords">—</div>
      </div>
    </div>
    <button class="gps-update-btn" onclick="startGPS()">📍 Update GPS</button>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" style="color:var(--orange)" id="sAssigned">0</div>
      <div class="stat-label">Assigned</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--purple)" id="sInProgress">0</div>
      <div class="stat-label">In Progress</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--green)" id="sDelivered">0</div>
      <div class="stat-label">Delivered Today</div>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tab active" id="dtab-assigned"   onclick="switchTab('assigned')">📦 Assigned</div>
    <div class="tab"        id="dtab-inprogress" onclick="switchTab('inprogress')">🚀 In Progress</div>
    <div class="tab"        id="dtab-history"    onclick="switchTab('history')">✅ History</div>
  </div>

  <!-- New Order Alert -->
  <div class="new-order-alert" id="newOrderAlert">
    <span style="font-size:22px">🔔</span>
    <div style="flex:1">
      <div style="font-size:13px;font-weight:800;color:var(--accent)">New Order Assigned!</div>
      <div style="font-size:11px;color:var(--text2)" id="newOrderAlertText">You have a new delivery</div>
    </div>
    <button onclick="document.getElementById('newOrderAlert').classList.remove('show');switchTab('assigned')"
      style="background:var(--brand3);border:none;border-radius:8px;padding:7px 13px;font-size:11px;font-weight:800;color:#fff;cursor:pointer">
      View →
    </button>
  </div>

  <!-- Orders Container -->
  <div id="ordersContainer" style="padding-top:6px">
    <div class="empty-state"><div class="empty-icon">📦</div><div class="empty-title">Loading orders...</div></div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <div class="nav-item active" id="nav-orders" onclick="switchTab('assigned')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 3H8l-2 4h12l-2-4z"/></svg>
      Orders
    </div>
    <div class="nav-item" id="nav-inprogress" onclick="switchTab('inprogress')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      In Progress
    </div>
    <div class="nav-item" id="nav-history" onclick="switchTab('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      History
    </div>
  </div>

</div>

<!-- Float Call -->
<a class="float-call" href="tel:+917799086877" title="Call SRICART Office">📞</a>

<!-- Toast -->
<div class="toast" id="dbToast"></div>

    if (!_audioCtx) _audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    [880, 1100].forEach((freq, i) => {
      setTimeout(() => {
        const o = _audioCtx.createOscillator(), g = _audioCtx.createGain();
        o.connect(g); g.connect(_audioCtx.destination);
        o.frequency.value = freq; o.type = 'sine';
        g.gain.setValueAtTime(0, _audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0.5, _audioCtx.currentTime+0.05);
        g.gain.exponentialRampToValueAtTime(0.001, _audioCtx.currentTime+0.5);
        o.start(); o.stop(_audioCtx.currentTime+0.5);
      }, i*300);
    });
  } catch(e) {}
}

/* ════════════════════════════════
   TOAST
════════════════════════════════ */
function showToast(msg, type='') {
  const t = document.getElementById('dbToast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' '+type : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.className = 'toast'; }, 3200);
}

/* ════════════════════════════════
   AUTH STATE
════════════════════════════════ */
if (auth) {
  auth.onAuthStateChanged(user => {
    if (user) {
      // Verify authorised delivery partner
      if (!DELIVERY_EMAILS.includes(user.email)) {
        auth.signOut();
        document.getElementById('loginError').textContent = 'Access denied. Authorised delivery partners only.';
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('dashboard').style.display   = 'none';
        DB_USER = null;
        return;
      }
      DB_USER = user;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display   = 'block';
      document.getElementById('dbEmailDisplay').textContent = user.email;
      startGPS();
      listenOrders();
      if (typeof Notification !== 'undefined' && Notification.permission === 'default') {
        Notification.requestPermission().catch(() => {});
      }
    } else {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('dashboard').style.display   = 'none';
      if (_unsubOrders) { _unsubOrders(); _unsubOrders = null; }
      DB_USER = null;
    }
  });
} else {
  document.getElementById('loginError').textContent = 'Firebase unavailable. Please reload.';
}

function dbLogin() {
  if (!auth) { document.getElementById('loginError').textContent = 'Service unavailable. Reload page.'; return; }
  const e = document.getElementById('dbEmail').value.trim();
  const p = document.getElementById('dbPass').value;
  const err = document.getElementById('loginError');
  err.textContent = '';
  if (!e || !p) { err.textContent = 'Enter email and password'; return; }
  err.textContent = 'Signing in…';
  auth.signInWithEmailAndPassword(e, p)
    .then(() => { err.textContent = ''; })
    .catch(ex => { err.textContent = ex.message; });
}

function dbLogout() {
  if (!auth) return;
  if (_unsubOrders) { _unsubOrders(); _unsubOrders = null; }
  auth.signOut().catch(() => {});
}

/* ════════════════════════════════
   ONLINE TOGGLE
════════════════════════════════ */
function toggleOnline() {
  const isOnline = document.getElementById('onlineToggle').checked;
  document.getElementById('onlineLabel').textContent = isOnline ? '🟢 You are Online' : '🔴 You are Offline';
  if (DB_USER && db) {
    db.collection('delivery_boys').doc(DB_USER.uid).set({
      online: isOnline,
      email:  DB_USER.email,
      name:   DB_USER.displayName || DB_USER.email,
      uid:    DB_USER.uid,
      gps:    GPS.lat ? {lat:GPS.lat, lng:GPS.lng} : null,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, {merge:true}).catch(() => {});
  }
}

/* ════════════════════════════════
   GPS
════════════════════════════════ */
function startGPS() {
  if (!navigator.geolocation) {
    document.getElementById('gpsStatus').textContent = 'GPS not supported';
    return;
  }
  document.getElementById('gpsStatus').textContent = 'Getting GPS…';
  navigator.geolocation.getCurrentPosition(
    pos => {
      GPS = { lat: pos.coords.latitude.toFixed(6), lng: pos.coords.longitude.toFixed(6) };
      document.getElementById('gpsDot').className    = 'gps-dot active';
      document.getElementById('gpsStatus').textContent  = 'GPS Active';
      document.getElementById('gpsCoords').textContent  = `${GPS.lat}, ${GPS.lng}`;
      if (DB_USER && db) {
        db.collection('delivery_boys').doc(DB_USER.uid).set({
          gps: GPS, email: DB_USER.email,
          name: DB_USER.displayName || DB_USER.email,
          uid: DB_USER.uid,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, {merge:true}).catch(() => {});
      }
    },
    () => {
      document.getElementById('gpsStatus').textContent = 'GPS error — Allow location';
      document.getElementById('gpsDot').className = 'gps-dot inactive';
    },
    { enableHighAccuracy:true, timeout:12000, maximumAge:30000 }
  );
}

/* ════════════════════════════════
   TAB SWITCHING  — BUG FIX: was broken due to operator precedence
════════════════════════════════ */
function switchTab(tab) {
  currentTab = tab;
  // Remove active from all tabs (corrected — was broken before)
  ['assigned','inprogress','history'].forEach(t => {
    document.getElementById('dtab-'+t)?.classList.remove('active');
    // BUG FIX: was `'nav-'+t==='assigned'` which always evaluates 'nav-assigned'==='assigned'=false
    const navId = t === 'assigned' ? 'nav-orders' : t === 'inprogress' ? 'nav-inprogress' : 'nav-history';
    document.getElementById(navId)?.classList.remove('active');
  });
  document.getElementById('dtab-'+tab)?.classList.add('active');
  const activeNavId = tab === 'assigned' ? 'nav-orders' : tab === 'inprogress' ? 'nav-inprogress' : 'nav-history';
  document.getElementById(activeNavId)?.classList.add('active');
  renderOrders();
}

/* ════════════════════════════════
   LISTEN ORDERS
════════════════════════════════ */
function listenOrders() {
  if (_unsubOrders) { _unsubOrders(); _unsubOrders = null; }
  if (!db || !DB_USER) return;

  _unsubOrders = db.collection('orders')
    .where('assignedRiderId', '==', DB_USER.uid)
    .limit(100)
    .onSnapshot(snap => {
      const newCount = snap.docs.filter(d => ['confirmed','packed'].includes(d.data().status)).length;
      if (_lastOrderCount !== null && newCount > _lastOrderCount) {
        playBeep();
        showToast('🔔 New order assigned to you!', 'success');
        document.getElementById('newOrderAlert').classList.add('show');
        document.getElementById('newOrderAlertText').textContent = 'A new delivery has been assigned to you';
        if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
          try {
            new Notification('🛵 New Delivery — SRICART', {
              body: 'You have a new delivery assigned!', tag: 'delivery-assign'
            });
          } catch(e) {}
        }
      }
      _lastOrderCount = newCount;
      _allOrders = snap.docs.map(d => ({ id:d.id, ...d.data() }));
      _allOrders.sort((a, b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
      renderOrders();
      updateStats();
    }, err => {
      console.error('listenOrders error:', err.message);
      showToast('⚠️ Could not load orders: ' + err.message, 'error');
      _allOrders = []; renderOrders(); updateStats();
    });
}

/* ════════════════════════════════
   UPDATE STATS
════════════════════════════════ */
function updateStats() {
  const today = new Date().toDateString();
  document.getElementById('sAssigned').textContent   = _allOrders.filter(o => o.status==='confirmed' || o.status==='packed').length;
  document.getElementById('sInProgress').textContent = _allOrders.filter(o => o.status==='out_for_delivery').length;
  document.getElementById('sDelivered').textContent  = _allOrders.filter(o =>
    o.status==='delivered' && o.updatedAt && new Date(o.updatedAt.seconds*1000).toDateString() === today
  ).length;
}

/* ════════════════════════════════
   RENDER ORDERS
════════════════════════════════ */
function renderOrders() {
  let orders;
  if (currentTab === 'assigned')    orders = _allOrders.filter(o => o.status==='confirmed' || o.status==='packed');
  else if (currentTab === 'inprogress') orders = _allOrders.filter(o => o.status==='out_for_delivery');
  else orders = _allOrders.filter(o => o.status==='delivered');

  const c = document.getElementById('ordersContainer');
  if (!orders.length) {
    const msgs  = { assigned:'No orders assigned yet', inprogress:'No orders in progress', history:'No deliveries yet today' };
    const icons = { assigned:'📭', inprogress:'🚀', history:'✅' };
    c.innerHTML = `<div class="empty-state"><div class="empty-icon">${icons[currentTab]}</div><div class="empty-title">${msgs[currentTab]}</div><div class="empty-sub">${currentTab==='assigned'?'Admin will assign orders to you':'—'}</div></div>`;
    return;
  }

  const titles = { assigned:'📦 Ready to Pick Up', inprogress:'🚀 Out for Delivery', history:'✅ Delivered Today' };

  if (currentTab === 'history') {
    c.innerHTML = `<div class="section-title">${titles.history}<span class="section-count">${orders.length}</span></div>` +
      orders.map(o => {
        const dt    = o.updatedAt ? new Date(o.updatedAt.seconds*1000).toLocaleString('en-IN',{dateStyle:'short',timeStyle:'short'}) : '—';
        const items = o.items ? o.items.map(i => i.name).join(', ') : o.summary||'—';
        return `<div class="history-card">
          <div class="history-check">✅</div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:800;color:var(--text)">${o.name||'—'}</div>
            <div style="font-size:11px;color:var(--text2);margin-top:2px">${items}</div>
            <div style="font-size:10px;color:var(--text3);margin-top:3px">Delivered: ${dt}</div>
          </div>
          ${o.total>0?`<div style="font-size:15px;font-weight:900;color:var(--green)">₹${o.total.toLocaleString('en-IN')}</div>`:''}
        </div>`;
      }).join('');
    return;
  }

  c.innerHTML = `<div class="section-title">${titles[currentTab]}<span class="section-count">${orders.length}</span></div>` +
    orders.map(o => {
      const dt    = o.createdAt ? new Date(o.createdAt.seconds*1000).toLocaleString('en-IN',{dateStyle:'short',timeStyle:'short'}) : '—';
      const items = o.items ? o.items.map(i => `${i.name} × ${i.qtyRaw||i.qty}`).join(' · ') : o.summary||'—';
      const st    = o.status;
      const mapUrl  = o.gpsMapLink || (o.gps ? `https://maps.google.com/?q=${o.gps.lat},${o.gps.lng}` : '');
      const navUrl  = o.gps ? `https://maps.google.com/maps?saddr=My+Location&daddr=${o.gps.lat},${o.gps.lng}` : o.gpsMapLink||'';
      const coordText = o.gps ? `${parseFloat(o.gps.lat).toFixed(6)}, ${parseFloat(o.gps.lng).toFixed(6)}` : '';

      let actions = '';
      if (st === 'confirmed' || st === 'packed') {
        actions = `<button class="act-btn act-start"   onclick="updateOrderStatus('${o.id}','out_for_delivery')">🚀 Start Delivery</button>
                   ${navUrl ? `<button class="act-btn act-map" onclick="window.open('${navUrl}','_blank')">🗺 Navigate</button>` : ''}
                   ${o.phone ? `<a class="act-btn act-call" href="tel:${o.phone.startsWith('+')?o.phone:'+91'+o.phone}">📞 Call</a>` : ''}`;
      } else if (st === 'out_for_delivery') {
        actions = `<button class="act-btn act-deliver" onclick="markDelivered('${o.id}')">✅ Mark Delivered</button>
                   ${navUrl ? `<button class="act-btn act-map" onclick="window.open('${navUrl}','_blank')">🗺 Navigate</button>` : ''}
                   ${o.phone ? `<a class="act-btn act-call" href="tel:${o.phone.startsWith('+')?o.phone:'+91'+o.phone}">📞 Call</a>` : ''}`;
      }

      return `<div class="order-card">
        <div class="order-card-top">
          <div>
            <div class="order-name">${o.name||o.userName||'—'}</div>
            <div class="order-meta">📱 ${o.phone||'—'} · 📍 ${o.location||o.serviceArea||'—'}</div>
            <div class="order-meta" style="margin-top:2px">${dt} · #${o.id.substring(0,8).toUpperCase()}</div>
          </div>
          <span class="badge badge-${st}">${st.replace(/_/g,' ')}</span>
        </div>
        <div class="order-body">
          <div class="order-items">🛒 ${items}</div>
          ${o.address ? `<div class="order-address">📍 <span>${o.address}</span></div>` : ''}
          ${o.instructions ? `<div class="order-instructions">📝 ${o.instructions}</div>` : ''}
          ${o.giftMsg ? `<div class="order-instructions" style="background:rgba(106,173,46,0.08);border-color:rgba(106,173,46,0.25)">🎁 ${o.giftMsg}</div>` : ''}
          ${(mapUrl||coordText) ? `<div style="background:rgba(68,201,255,0.08);border:1px solid rgba(68,201,255,0.25);border-radius:10px;padding:9px 12px;margin-bottom:10px;font-size:12px">
            <div style="font-weight:800;color:var(--blue);margin-bottom:4px">📍 Customer Location</div>
            ${coordText ? `<div style="font-family:monospace;color:var(--text2);font-size:10px;margin-bottom:4px">${coordText}</div>` : ''}
            ${mapUrl ? `<a href="${mapUrl}" target="_blank" style="color:var(--blue);font-weight:700;font-size:11px;text-decoration:none">🗺 Open in Google Maps →</a>` : ''}
          </div>` : ''}
          ${o.total>0 ? `<div style="font-size:15px;font-weight:900;color:var(--green);margin-bottom:10px">Total: ₹${o.total.toLocaleString('en-IN')}</div>` : ''}
          <div class="order-actions">${actions}</div>
        </div>
      </div>`;
    }).join('');
}

/* ════════════════════════════════
   STATUS UPDATE FUNCTIONS
════════════════════════════════ */
function updateOrderStatus(id, newStatus) {
  if (!db || !DB_USER) { showToast('Service unavailable', 'error'); return; }
  const now = new Date();
  db.collection('orders').doc(id).get().then(doc => {
    const hist = doc.data()?.statusHistory || [];
    hist.push({ status: newStatus, time: now.toISOString(), by: DB_USER.email });
    return db.collection('orders').doc(id).update({
      status: newStatus,
      deliveryBoyId:    DB_USER.uid,
      deliveryBoyEmail: DB_USER.email,
      deliveryBoyName:  DB_USER.displayName || DB_USER.email,
      deliveryGPS:      GPS.lat ? GPS : null,
      statusHistory:    hist,
      updatedAt:        firebase.firestore.FieldValue.serverTimestamp(),
      updatedAtISO:     now.toISOString(),
      updatedBy:        DB_USER.email,
      ...(newStatus === 'out_for_delivery' ? { dispatchedAt: now.toISOString() } : {})
    });
  })
  .then(() => showToast(newStatus === 'out_for_delivery' ? '🚀 Delivery started!' : '✅ Done', 'success'))
  .catch(e => showToast('Error: ' + e.message, 'error'));
}

function markDelivered(id) {
  if (!confirm('Mark this order as DELIVERED?')) return;
  if (!db || !DB_USER) { showToast('Service unavailable', 'error'); return; }
  startGPS(); // refresh GPS before logging delivery
  const now = new Date();
  db.collection('orders').doc(id).update({
    status:           'delivered',
    deliveryBoyId:    DB_USER.uid,
    deliveryBoyEmail: DB_USER.email,
    deliveryBoyName:  DB_USER.displayName || DB_USER.email,
    deliveryGPS:      GPS.lat ? GPS : null,
    deliveredAt:      now.toISOString(),
    updatedAt:        firebase.firestore.FieldValue.serverTimestamp(),
    updatedAtISO:     now.toISOString(),
    updatedBy:        DB_USER.email
  }).then(() => showToast('🎉 Delivered! Great job!', 'success'))
    .catch(e => showToast('Error: ' + e.message, 'error'));
}
