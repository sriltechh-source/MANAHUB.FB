<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SRICART — Delivery Portal</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root{
  --bg:#0a0f1e;--bg2:#0d1426;--bg3:#111827;
  --glass:rgba(255,255,255,0.05);--glass2:rgba(255,255,255,0.08);--glass3:rgba(255,255,255,0.12);
  --border:rgba(255,255,255,0.10);--border2:rgba(255,255,255,0.15);
  --brand:#00d084;--brand2:#00b8d4;--brand3:#7c3aed;
  --text:#f0f4ff;--text2:#a0aec0;--text3:#64748b;
  --red:#ff4757;--orange:#ff6b35;--yellow:#ffd32a;--green:#00d084;--blue:#00b8d4;--purple:#a78bfa;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 10%,rgba(0,208,132,0.07) 0%,transparent 55%),radial-gradient(ellipse at 80% 90%,rgba(0,184,212,0.05) 0%,transparent 55%);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(0,208,132,0.3);border-radius:3px}

/* ── Login ── */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;position:relative;z-index:1}
.login-card{background:var(--glass2);backdrop-filter:blur(20px);border:1px solid var(--border2);border-radius:24px;padding:36px 28px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 60px rgba(0,208,132,0.08)}
.login-logo{text-align:center;margin-bottom:10px}
.login-logo-icon{width:60px;height:60px;background:linear-gradient(135deg,var(--orange),var(--red));border-radius:18px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 0 30px rgba(255,107,53,0.4)}
.login-title{text-align:center;font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--orange),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:10px 0 4px}
.login-sub{text-align:center;font-size:13px;color:var(--text2);margin-bottom:26px}
.form-input{width:100%;background:var(--glass);border:1px solid var(--border2);border-radius:12px;padding:13px 16px;font-size:14px;color:var(--text);outline:none;margin-bottom:12px;font-family:inherit;transition:.2s}
.form-input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,107,53,0.15)}
.form-input::placeholder{color:var(--text3)}
.btn-login{width:100%;padding:14px;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,var(--orange),var(--red));color:#fff;font-family:inherit;transition:.2s;letter-spacing:.3px}
.btn-login:active{transform:scale(.98)}
.error-msg{color:var(--red);font-size:12px;text-align:center;margin-top:8px;min-height:18px}

/* ── Dashboard ── */
.dashboard{display:none;position:relative;z-index:1;padding-bottom:75px}

/* ── Header ── */
.header{background:rgba(10,15,30,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 16px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:10px}
.header-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--orange),var(--red));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.header-title{font-size:15px;font-weight:800;color:var(--text)}
.header-sub{font-size:11px;color:var(--text2)}
.logout-btn{background:rgba(255,71,87,0.15);border:1px solid rgba(255,71,87,0.3);color:var(--red);padding:6px 12px;border-radius:9px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit}

/* ── Online toggle bar ── */
.online-bar{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--glass2);border-bottom:1px solid var(--border)}
.online-label{flex:1;font-size:13px;font-weight:700}
.toggle-wrap{position:relative;width:50px;height:26px;cursor:pointer}
.toggle-wrap input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:rgba(100,116,139,0.3);border:1px solid var(--border2);border-radius:26px;transition:.3s}
.toggle-slider:before{content:'';position:absolute;height:20px;width:20px;left:3px;bottom:2px;background:var(--text3);border-radius:50%;transition:.3s}
input:checked+.toggle-slider{background:rgba(0,208,132,0.3);border-color:rgba(0,208,132,0.5)}
input:checked+.toggle-slider:before{transform:translateX(22px);background:var(--green)}

/* ── GPS bar ── */
.gps-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--glass);border-bottom:1px solid var(--border)}
.gps-info{display:flex;align-items:center;gap:8px}
.gps-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gps-dot.active{background:var(--green);box-shadow:0 0 8px var(--green);animation:gpsPulse 2s infinite}
.gps-dot.inactive{background:var(--text3)}
@keyframes gpsPulse{0%,100%{opacity:1}50%{opacity:.4}}
.gps-text{font-size:12px;font-weight:700;color:var(--text2)}
.gps-coords{font-size:10px;color:var(--text3);font-family:monospace}
.gps-update-btn{background:rgba(0,184,212,0.15);border:1px solid rgba(0,184,212,0.3);color:var(--blue);padding:6px 12px;border-radius:9px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit}

/* ── Stats ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 14px}
.stat-card{background:var(--glass2);border:1px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center}
.stat-num{font-size:24px;font-weight:900;line-height:1}
.stat-label{font-size:10px;color:var(--text2);margin-top:4px;font-weight:600}

/* ── Tab bar ── */
.tab-bar{display:flex;background:var(--glass2);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:12px 6px;text-align:center;font-size:11px;font-weight:700;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:.2s}
.tab.active{color:var(--orange);border-bottom-color:var(--orange)}

/* ── Section title ── */
.section-title{font-size:14px;font-weight:800;color:var(--text);padding:14px 14px 8px;display:flex;align-items:center;justify-content:space-between}
.section-count{font-size:12px;background:rgba(255,107,53,0.2);color:var(--orange);border:1px solid rgba(255,107,53,0.3);padding:2px 9px;border-radius:999px;font-weight:800}

/* ── Order Cards ── */
.order-card{background:var(--glass2);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:16px;margin:0 12px 12px;overflow:hidden;transition:.2s}
.order-card:active{transform:scale(.99)}
.order-card-top{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.order-name{font-size:15px;font-weight:800;color:var(--text)}
.order-meta{font-size:11px;color:var(--text3);margin-top:3px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;font-size:10px;font-weight:800}
.badge-confirmed{background:rgba(0,184,212,0.2);color:var(--blue);border:1px solid rgba(0,184,212,0.3)}.badge-packed{background:rgba(99,102,241,0.2);color:#c4b5fd;border:1px solid rgba(99,102,241,0.3)}
.badge-out_for_delivery{background:rgba(124,58,237,0.2);color:var(--purple);border:1px solid rgba(124,58,237,0.3)}
.badge-delivered{background:rgba(0,208,132,0.2);color:var(--green);border:1px solid rgba(0,208,132,0.3)}
.order-body{padding:12px 14px}
.order-items{font-size:12px;color:var(--text2);line-height:1.7;background:var(--glass);border-radius:10px;padding:8px 10px;margin-bottom:10px}
.order-address{display:flex;gap:6px;font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.5}
.order-instructions{font-size:11px;color:var(--text3);background:rgba(255,211,42,0.08);border:1px solid rgba(255,211,42,0.2);border-radius:8px;padding:7px 10px;margin-bottom:10px}
.order-actions{display:flex;gap:6px;flex-wrap:wrap}
.act-btn{flex:1;min-width:80px;padding:11px 8px;border:none;border-radius:11px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;transition:.2s;text-align:center}
.act-btn:active{transform:scale(.97)}
.act-start{background:linear-gradient(135deg,rgba(255,107,53,0.3),rgba(255,71,87,0.2));border:1px solid rgba(255,107,53,0.5);color:var(--orange)}
.act-deliver{background:linear-gradient(135deg,rgba(0,208,132,0.3),rgba(0,184,212,0.2));border:1px solid rgba(0,208,132,0.5);color:var(--green)}
.act-call{background:var(--glass);border:1px solid var(--border2);color:var(--text2)}
.act-map{background:rgba(0,184,212,0.2);border:1px solid rgba(0,184,212,0.3);color:var(--blue)}

/* ── Empty ── */
.empty-state{text-align:center;padding:50px 20px}
.empty-icon{font-size:44px;margin-bottom:12px}
.empty-title{font-size:14px;font-weight:800;color:var(--text2);margin-bottom:6px}
.empty-sub{font-size:12px;color:var(--text3)}

/* ── New order alert ── */
.new-order-alert{display:none;margin:10px 12px;background:linear-gradient(135deg,rgba(255,107,53,0.2),rgba(255,71,87,0.15));border:1px solid rgba(255,107,53,0.5);border-radius:14px;padding:12px 14px;align-items:center;gap:10px;animation:alertPulse 2s infinite}
.new-order-alert.show{display:flex}
@keyframes alertPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,53,0.4)}50%{box-shadow:0 0 0 8px rgba(255,107,53,0)}}

/* ── Bottom nav ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(10,15,30,0.92);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;height:60px;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text3);font-size:10px;font-weight:700;transition:.2s}
.nav-item.active{color:var(--orange)}
.nav-item svg{width:20px;height:20px}

/* ── Float call btn ── */
.float-call{position:fixed;bottom:72px;right:16px;width:52px;height:52px;background:linear-gradient(135deg,var(--green),var(--blue));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 20px rgba(0,208,132,0.5);z-index:90;text-decoration:none;transition:.2s}
.float-call:active{transform:scale(.95)}

/* ── Toast ── */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:12px 20px;font-size:13px;font-weight:700;color:var(--text);z-index:500;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:rgba(0,208,132,0.5);color:var(--green)}
.toast.error{border-color:rgba(255,71,87,0.5);color:var(--red)}

/* ── History card simplified ── */
.history-card{background:var(--glass);border:1px solid var(--border);border-radius:12px;margin:0 12px 8px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.history-check{width:36px;height:36px;border-radius:10px;background:rgba(0,208,132,0.15);border:1px solid rgba(0,208,132,0.3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo"><div class="login-logo-icon">🛵</div></div>
    <div class="login-title">Delivery Portal</div>
    <div class="login-sub">SRICART — Delivery Team Login</div>
    <input class="form-input" type="email" id="dbEmail" placeholder="Your email" autocomplete="email"/>
    <input class="form-input" type="password" id="dbPass" placeholder="Password" autocomplete="current-password"/>
    <button class="btn-login" onclick="dbLogin()">Sign In →</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="header-logo">🛵</div>
      <div>
        <div class="header-title">Delivery Dashboard</div>
        <div class="header-sub" id="dbEmailDisplay">—</div>
      </div>
    </div>
    <button class="logout-btn" onclick="dbLogout()">Logout</button>
  </div>

  <!-- Online Toggle -->
  <div class="online-bar">
    <span class="online-label" id="onlineLabel">🔴 You are Offline</span>
    <label class="toggle-wrap">
      <input type="checkbox" id="onlineToggle" onchange="toggleOnline()"/>
      <span class="toggle-slider"></span>
    </label>
  </div>

  <!-- GPS Bar -->
  <div class="gps-bar">
    <div class="gps-info">
      <div class="gps-dot inactive" id="gpsDot"></div>
      <div>
        <div class="gps-text" id="gpsStatus">GPS not active</div>
        <div class="gps-coords" id="gpsCoords">—</div>
      </div>
    </div>
    <button class="gps-update-btn" onclick="startGPS()">📍 Update GPS</button>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" style="color:var(--orange)" id="sAssigned">0</div>
      <div class="stat-label">Assigned</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--purple)" id="sInProgress">0</div>
      <div class="stat-label">In Progress</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--green)" id="sDelivered">0</div>
      <div class="stat-label">Delivered Today</div>
    </div>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <div class="tab active" id="dtab-assigned" onclick="switchTab('assigned')">📦 Assigned</div>
    <div class="tab" id="dtab-inprogress" onclick="switchTab('inprogress')">🚀 In Progress</div>
    <div class="tab" id="dtab-history" onclick="switchTab('history')">✅ History</div>
  </div>

  <!-- New order alert -->
  <div class="new-order-alert" id="newOrderAlert">
    <span style="font-size:22px">🔔</span>
    <div style="flex:1">
      <div style="font-size:13px;font-weight:800;color:var(--orange)">New Order Assigned!</div>
      <div style="font-size:11px;color:var(--text2)" id="newOrderAlertText">You have a new delivery</div>
    </div>
    <button onclick="document.getElementById('newOrderAlert').classList.remove('show');switchTab('assigned')" style="background:var(--orange);border:none;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:800;color:#fff;cursor:pointer">View →</button>
  </div>

  <!-- Orders container -->
  <div id="ordersContainer" style="padding-top:6px">
    <div class="empty-state"><div class="empty-icon">📦</div><div class="empty-title">Loading orders...</div></div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <div class="nav-item active" id="nav-orders" onclick="switchTab('assigned')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 3H8l-2 4h12l-2-4z"/></svg>
      Orders
    </div>
    <div class="nav-item" id="nav-inprogress" onclick="switchTab('inprogress')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      In Progress
    </div>
    <div class="nav-item" id="nav-history" onclick="switchTab('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      History
    </div>
  </div>

</div>

<!-- Float Call -->
<a class="float-call" href="tel:+917799086877" title="Call SRICART Office">📞</a>

<!-- Toast -->
<div class="toast" id="dbToast"></div>

<script>
const firebaseConfig={apiKey:"AIzaSyAp-g1syTD9Q8ZRgjdxQDbFF6D9l9zHISY",authDomain:"fir-v1-a695a.firebaseapp.com",projectId:"fir-v1-a695a",storageBucket:"fir-v1-a695a.firebasestorage.app",messagingSenderId:"50283321145",appId:"1:50283321145:web:94c4c204309c0914ff7ae8"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth(), db=firebase.firestore();

let DB_USER=null, GPS={lat:null,lng:null}, currentTab='assigned';
let _allOrders=[], _unsubOrders=null, _lastOrderCount=null;
let _audioCtx=null;

function playBeep(){
  try{
    if(!_audioCtx)_audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    [880,1100].forEach((freq,i)=>{
      setTimeout(()=>{
        const o=_audioCtx.createOscillator(),g=_audioCtx.createGain();
        o.connect(g);g.connect(_audioCtx.destination);
        o.frequency.value=freq;o.type='sine';
        g.gain.setValueAtTime(0,_audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0.5,_audioCtx.currentTime+0.05);
        g.gain.exponentialRampToValueAtTime(0.001,_audioCtx.currentTime+0.5);
        o.start();o.stop(_audioCtx.currentTime+0.5);
      },i*300);
    });
  }catch(e){}
}

function showToast(msg,type=''){
  const t=document.getElementById('dbToast');
  t.textContent=msg;t.className='toast show'+(type?' '+type:'');
  clearTimeout(t._t);t._t=setTimeout(()=>t.className='toast',3000);
}

auth.onAuthStateChanged(user=>{
  if(user){
    DB_USER=user;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('dashboard').style.display='block';
    document.getElementById('dbEmailDisplay').textContent=user.email;
    startGPS();
    listenOrders();
    if(Notification&&Notification.permission==='default') Notification.requestPermission();
  } else {
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('dashboard').style.display='none';
    if(_unsubOrders){_unsubOrders();_unsubOrders=null;}
    DB_USER=null;
  }
});

function dbLogin(){
  const e=document.getElementById('dbEmail').value.trim(), p=document.getElementById('dbPass').value;
  const err=document.getElementById('loginError');err.textContent='';
  if(!e||!p){err.textContent='Enter email and password';return;}
  auth.signInWithEmailAndPassword(e,p).catch(ex=>{err.textContent=ex.message;});
}

function dbLogout(){
  if(_unsubOrders)_unsubOrders();
  auth.signOut();
}

function toggleOnline(){
  const isOnline=document.getElementById('onlineToggle').checked;
  document.getElementById('onlineLabel').textContent=isOnline?'🟢 You are Online':'🔴 You are Offline';
  if(DB_USER){
    db.collection('delivery_boys').doc(DB_USER.uid).set({
      online:isOnline,
      email:DB_USER.email,
      name:DB_USER.displayName||DB_USER.email,
      uid:DB_USER.uid,
      gps:GPS.lat?{lat:GPS.lat,lng:GPS.lng}:null,
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true});
  }
}

function startGPS(){
  if(!navigator.geolocation){document.getElementById('gpsStatus').textContent='GPS not supported';return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    GPS={lat:pos.coords.latitude.toFixed(6),lng:pos.coords.longitude.toFixed(6)};
    document.getElementById('gpsDot').className='gps-dot active';
    document.getElementById('gpsStatus').textContent='GPS Active';
    document.getElementById('gpsCoords').textContent=`${GPS.lat}, ${GPS.lng}`;
    if(DB_USER){
      db.collection('delivery_boys').doc(DB_USER.uid).set({
        gps:GPS,email:DB_USER.email,name:DB_USER.displayName||DB_USER.email,uid:DB_USER.uid,updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      },{merge:true});
    }
  },()=>{
    document.getElementById('gpsStatus').textContent='GPS error — Allow location';
    document.getElementById('gpsDot').className='gps-dot inactive';
  },{enableHighAccuracy:true,timeout:10000});
}

function switchTab(tab){
  currentTab=tab;
  ['assigned','inprogress','history'].forEach(t=>{
    document.getElementById('dtab-'+t)?.classList.remove('active');
    document.getElementById('nav-'+t==='assigned'?'orders':t==='inprogress'?'inprogress':'history')?.classList.remove('active');
  });
  document.getElementById('dtab-'+tab)?.classList.add('active');
  const navId=tab==='assigned'?'nav-orders':tab==='inprogress'?'nav-inprogress':'nav-history';
  document.getElementById(navId)?.classList.add('active');
  renderOrders();
}

function listenOrders(){
  if(_unsubOrders)_unsubOrders();
  _unsubOrders=db.collection('orders')
    .where('assignedRiderId','==',DB_USER.uid)
    .limit(100)
    .onSnapshot(snap=>{
      const newCount=snap.docs.filter(d=>['confirmed','packed'].includes(d.data().status)).length;
      if(_lastOrderCount!==null&&newCount>_lastOrderCount){
        playBeep();
        showToast('🔔 New order assigned to you!','success');
        document.getElementById('newOrderAlert').classList.add('show');
        document.getElementById('newOrderAlertText').textContent='A new delivery has been assigned to you';
        if(Notification.permission==='granted'){
          new Notification('🛵 New Delivery — SRICART',{body:'You have a new delivery assigned. Check the app!',tag:'delivery-assign'});
        }
      }
      _lastOrderCount=newCount;
      _allOrders=snap.docs.map(d=>({id:d.id,...d.data()}));
      _allOrders.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
      renderOrders();
      updateStats();
    },err=>{
      console.error("listenOrders error:",err.message);
      showToast("⚠️ Could not load orders: "+err.message,"error");
      _allOrders=[];renderOrders();updateStats();
    });
}

function updateStats(){
  const today=new Date().toDateString();
  document.getElementById('sAssigned').textContent=_allOrders.filter(o=>o.status==='confirmed'||o.status==='packed').length;
  document.getElementById('sInProgress').textContent=_allOrders.filter(o=>o.status==='out_for_delivery').length;
  document.getElementById('sDelivered').textContent=_allOrders.filter(o=>o.status==='delivered'&&o.updatedAt&&new Date(o.updatedAt.seconds*1000).toDateString()===today).length;
}

function renderOrders(){
  let orders;
  if(currentTab==='assigned') orders=_allOrders.filter(o=>o.status==='confirmed'||o.status==='packed');
  else if(currentTab==='inprogress') orders=_allOrders.filter(o=>o.status==='out_for_delivery');
  else orders=_allOrders.filter(o=>o.status==='delivered');

  const c=document.getElementById('ordersContainer');

  if(!orders.length){
    const msgs={assigned:'No orders assigned yet',inprogress:'No orders in progress',history:'No deliveries yet today'};
    const icons={assigned:'📭',inprogress:'🚀',history:'✅'};
    c.innerHTML=`<div class="empty-state"><div class="empty-icon">${icons[currentTab]}</div><div class="empty-title">${msgs[currentTab]}</div><div class="empty-sub">${currentTab==='assigned'?'Admin will assign orders to you':'—'}</div></div>`;
    return;
  }

  const title=currentTab==='assigned'?'📦 Ready to Pick Up':currentTab==='inprogress'?'🚀 Out for Delivery':'✅ Delivered Today';

  if(currentTab==='history'){
    c.innerHTML=`<div class="section-title">${title}<span class="section-count">${orders.length}</span></div>`+
      orders.map(o=>{
        const dt=o.updatedAt?new Date(o.updatedAt.seconds*1000).toLocaleString('en-IN',{dateStyle:'short',timeStyle:'short'}):'—';
        const items=o.items?o.items.map(i=>i.name).join(', '):o.summary||'—';
        return `<div class="history-card">
          <div class="history-check">✅</div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:800;color:var(--text)">${o.name||'—'}</div>
            <div style="font-size:11px;color:var(--text2);margin-top:2px">${items}</div>
            <div style="font-size:10px;color:var(--text3);margin-top:3px">Delivered: ${dt}</div>
          </div>
        </div>`;
      }).join('');
    return;
  }

  c.innerHTML=`<div class="section-title">${title}<span class="section-count">${orders.length}</span></div>`+
    orders.map(o=>{
      const dt=o.createdAt?new Date(o.createdAt.seconds*1000).toLocaleString('en-IN',{dateStyle:'short',timeStyle:'short'}):'—';
      const items=o.items?o.items.map(i=>`${i.name} × ${i.qtyRaw||i.qty}`).join(' · '):o.summary||'—';
      const st=o.status;
      const gpsLink=o.gps?`https://maps.google.com/?q=${o.gps.lat},${o.gps.lng}`:'';
      const custGps=o.gps?`https://maps.google.com/maps?saddr=My+Location&daddr=${o.gps.lat},${o.gps.lng}`:'';

      // GPS from order (customer location) or gpsMapLink field
      const mapUrl = o.gpsMapLink || gpsLink;
      const navUrl = o.gps ? `https://maps.google.com/maps?saddr=My+Location&daddr=${o.gps.lat},${o.gps.lng}` : (o.gpsMapLink||'');
      const coordText = o.gps ? `${parseFloat(o.gps.lat).toFixed(6)}, ${parseFloat(o.gps.lng).toFixed(6)}` : '';

      let actions='';
      if(st==='confirmed'||st==='packed'){
        actions=`<button class="act-btn act-start" onclick="updateOrderStatus('${o.id}','out_for_delivery')">🚀 Start Delivery</button>
                 ${navUrl?`<button class="act-btn act-map" onclick="window.open('${navUrl}','_blank')">🗺 Navigate</button>`:''}
                 ${o.phone?`<a class="act-btn act-call" href="tel:${o.phone.startsWith('+')?o.phone:'+91'+o.phone}">📞 Call</a>`:''}`;
      } else if(st==='out_for_delivery'){
        actions=`<button class="act-btn act-deliver" onclick="markDelivered('${o.id}')">✅ Mark Delivered</button>
                 ${navUrl?`<button class="act-btn act-map" onclick="window.open('${navUrl}','_blank')">🗺 Navigate</button>`:''}
                 ${o.phone?`<a class="act-btn act-call" href="tel:${o.phone.startsWith('+')?o.phone:'+91'+o.phone}">📞 Call</a>`:''}`;
      }

      return `<div class="order-card">
        <div class="order-card-top">
          <div>
            <div class="order-name">${o.name||o.userName||'—'}</div>
            <div class="order-meta">📱 ${o.phone||'—'} · 📍 ${o.location||'—'}</div>
            <div class="order-meta" style="margin-top:2px">${dt} · ${o.id.substring(0,8)}</div>
          </div>
          <span class="badge badge-${st}">${st.replace(/_/g,' ')}</span>
        </div>
        <div class="order-body">
          <div class="order-items">🛒 ${items}</div>
          ${o.address?`<div class="order-address">📍 <span>${o.address}</span></div>`:''}
          ${o.instructions?`<div class="order-instructions">📝 ${o.instructions}</div>`:''}
          ${o.giftMsg?`<div class="order-instructions" style="background:rgba(0,208,132,0.08);border-color:rgba(0,208,132,0.2)">🎁 ${o.giftMsg}</div>`:''}
          ${(mapUrl||coordText)?`<div style="background:rgba(0,184,212,0.08);border:1px solid rgba(0,184,212,0.25);border-radius:10px;padding:8px 12px;margin-bottom:10px;font-size:12px">
            <div style="font-weight:800;color:var(--blue);margin-bottom:4px">📍 Customer Location</div>
            ${coordText?`<div style="font-family:monospace;color:var(--text2);font-size:11px;margin-bottom:4px">${coordText}</div>`:''}
            ${mapUrl?`<a href="${mapUrl}" target="_blank" style="color:var(--blue);font-weight:700;font-size:11px;text-decoration:none">🗺 Open in Google Maps →</a>`:''}
          </div>`:''}
          <div class="order-actions">${actions}</div>
        </div>
      </div>`;
    }).join('');
}

function updateOrderStatus(id,newStatus){
  const now = new Date();
  const timeField = newStatus==='out_for_delivery'?'dispatchedAt':null;
  const updateData = {
    status:newStatus,
    deliveryBoyId:DB_USER.uid,
    deliveryBoyEmail:DB_USER.email,
    deliveryBoyName:DB_USER.displayName||DB_USER.email,
    deliveryGPS:GPS.lat?GPS:null,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
    updatedAtISO:now.toISOString(),
    updatedBy:DB_USER.email
  };
  if(timeField) updateData[timeField] = now.toISOString();
  // Append to statusHistory
  db.collection('orders').doc(id).get().then(doc=>{
    const hist = doc.data()?.statusHistory || [];
    hist.push({ status:newStatus, time:now.toISOString(), by: DB_USER.email });
    updateData.statusHistory = hist;
    return db.collection('orders').doc(id).update(updateData);
  }).then(()=>showToast(newStatus==="out_for_delivery"?"🚀 Delivery started!":"✅ Done","success"))
    .catch(e=>showToast("Error: "+e.message,"error"));
}

function markDelivered(id){
  if(!confirm('Mark this order as DELIVERED?'))return;
  startGPS();
  const now = new Date();
  db.collection("orders").doc(id).update({
    status:'delivered',
    deliveryBoyId:DB_USER.uid,
    deliveryBoyEmail:DB_USER.email,
    deliveryBoyName:DB_USER.displayName||DB_USER.email,
    deliveryGPS:GPS.lat?GPS:null,
    deliveredAt:now.toISOString(),
    updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
    updatedAtISO:now.toISOString(),
    updatedBy: DB_USER.email
  }).then(()=>showToast('🎉 Delivered! Great job!','success'))
    .catch(e=>showToast('Error: '+e.message,'error'));
}
</script>
