<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Mana Hub — Delivery Dashboard</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{--brand:#2D5016;--brand2:#4a7c28;--bg:#f5f7f2;--card:#fff;--border:#e0e0e0;--text:#1a1a1a;--muted:#888;--red:#c0392b;--blue:#1565c0;--green:#2e7d32;--orange:#e65100}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto}
.header{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-title{font-size:17px;font-weight:900}
.header-sub{font-size:11px;opacity:.85}
.logout-btn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:var(--card);border-radius:16px;padding:28px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.10)}
.login-logo{text-align:center;font-size:48px;margin-bottom:10px}
.login-title{text-align:center;font-size:20px;font-weight:900;color:var(--brand);margin-bottom:4px}
.login-sub{text-align:center;font-size:13px;color:var(--muted);margin-bottom:22px}
input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:14px;outline:none;margin-bottom:12px}
input:focus{border-color:var(--brand)}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff}
.error-msg{color:var(--red);font-size:12px;text-align:center;margin-top:8px}
.dashboard{display:none;padding-bottom:80px}
.gps-bar{background:rgba(45,80,22,.09);border-bottom:1.5px solid rgba(45,80,22,.15);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;font-size:12px}
.gps-status{font-weight:700;color:var(--brand)}
.gps-coords{font-size:10px;color:var(--muted);font-family:monospace}
.gps-btn{background:var(--brand);color:#fff;border:none;border-radius:7px;padding:5px 12px;font-size:11px;font-weight:800;cursor:pointer}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 14px}
.stat-card{background:var(--card);border-radius:11px;padding:12px;text-align:center;border:1px solid var(--border)}
.stat-num{font-size:24px;font-weight:900}
.stat-label{font-size:10px;color:var(--muted);margin-top:2px}
.section-title{font-size:15px;font-weight:900;padding:0 14px 8px;color:var(--brand)}
.order-card{background:var(--card);border-radius:13px;border:1px solid var(--border);margin:0 14px 12px;overflow:hidden}
.order-card-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.order-id{font-size:11px;color:var(--muted)}
.order-name{font-size:14px;font-weight:800;color:var(--text)}
.order-phone{font-size:12px;color:var(--muted);margin-top:2px}
.order-body{padding:12px 14px}
.order-items{font-size:12px;color:var(--text);margin-bottom:8px;line-height:1.6}
.order-address{font-size:12px;color:var(--muted);display:flex;align-items:flex-start;gap:5px;margin-bottom:10px}
.order-actions{display:flex;gap:8px}
.action-btn{flex:1;padding:10px;border:none;border-radius:9px;font-size:12px;font-weight:800;cursor:pointer;text-align:center}
.btn-start{background:linear-gradient(135deg,#e65100,#f57c00);color:#fff}
.btn-deliver{background:linear-gradient(135deg,var(--green),#388e3c);color:#fff}
.btn-call{background:var(--bg);border:1.5px solid var(--border);color:var(--text)}
.btn-map{background:linear-gradient(135deg,var(--blue),#1976d2);color:#fff}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:10px;font-weight:800}
.badge-confirmed{background:#e3f2fd;color:var(--blue)}
.badge-out_for_delivery{background:#ede7f6;color:#6a1b9a}
.badge-delivered{background:#e8f5e9;color:var(--green)}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty-title{font-size:15px;font-weight:800;margin-bottom:4px}
.tab-bar{display:flex;background:var(--card);border-bottom:1.5px solid var(--border)}
.tab{flex:1;padding:12px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent}
.tab.active{color:var(--brand);border-bottom-color:var(--brand)}
.online-toggle{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--card);border-bottom:1px solid var(--border)}
.toggle-label{font-size:13px;font-weight:700;flex:1}
.toggle-switch{position:relative;width:46px;height:25px}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:25px;transition:.3s}
.toggle-slider:before{position:absolute;content:'';height:19px;width:19px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.toggle-slider{background:var(--brand)}
input:checked+.toggle-slider:before{transform:translateX(21px)}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🛵</div>
    <div class="login-title">Delivery Portal</div>
    <div class="login-sub">Mana Hub — Delivery Team</div>
    <input type="email" id="dbEmail" placeholder="Your email" autocomplete="email"/>
    <input type="password" id="dbPass" placeholder="Password" autocomplete="current-password"/>
    <button class="btn btn-primary" onclick="dbLogin()">Sign In</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="header">
    <div>
      <div class="header-title">🛵 Delivery Dashboard</div>
      <div class="header-sub" id="dbEmailDisplay"></div>
    </div>
    <button class="logout-btn" onclick="dbLogout()">Logout</button>
  </div>

  <!-- Online toggle -->
  <div class="online-toggle">
    <span class="toggle-label" id="onlineLabel">🔴 You are Offline</span>
    <label class="toggle-switch">
      <input type="checkbox" id="onlineToggle" onchange="toggleOnline()"/>
      <span class="toggle-slider"></span>
    </label>
  </div>

  <!-- GPS Bar -->
  <div class="gps-bar">
    <div>
      <div class="gps-status" id="gpsStatus">📍 GPS Off</div>
      <div class="gps-coords" id="gpsCoords">—</div>
    </div>
    <button class="gps-btn" onclick="startGPS()">📍 Update GPS</button>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" style="color:var(--orange)" id="sAssigned">0</div><div class="stat-label">Assigned</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#6a1b9a" id="sInProgress">0</div><div class="stat-label">In Progress</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green)" id="sDelivered">0</div><div class="stat-label">Delivered Today</div></div>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <div class="tab active" id="dtab-assigned" onclick="switchDTab('assigned')">📦 Assigned</div>
    <div class="tab" id="dtab-inprogress" onclick="switchDTab('inprogress')">🚀 In Progress</div>
    <div class="tab" id="dtab-history" onclick="switchDTab('history')">✅ History</div>
  </div>

  <div id="ordersContainer" style="padding-top:10px">
    <div class="empty-state"><div class="empty-icon">📦</div><div class="empty-title">Loading orders...</div></div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAp-g1syTD9Q8ZRgjdxQDbFF6D9l9zHISY",
  authDomain: "fir-v1-a695a.firebaseapp.com",
  projectId: "fir-v1-a695a",
  storageBucket: "fir-v1-a695a.firebasestorage.app",
  messagingSenderId: "50283321145",
  appId: "1:50283321145:web:94c4c204309c0914ff7ae8"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let DB_USER = null;
let GPS = { lat: null, lng: null };
let currentDTab = 'assigned';
let unsubOrders = null;

auth.onAuthStateChanged(user => {
  if (user) {
    DB_USER = user;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('dbEmailDisplay').textContent = user.email;
    startGPS();
    listenOrders();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    if (unsubOrders) { unsubOrders(); unsubOrders = null; }
  }
});

function dbLogin() {
  const email = document.getElementById('dbEmail').value.trim();
  const pass = document.getElementById('dbPass').value;
  const err = document.getElementById('loginError');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'Enter email and password'; return; }
  auth.signInWithEmailAndPassword(email, pass).catch(e => { err.textContent = e.message; });
}

function dbLogout() {
  if (unsubOrders) unsubOrders();
  auth.signOut();
}

function toggleOnline() {
  const isOnline = document.getElementById('onlineToggle').checked;
  document.getElementById('onlineLabel').textContent = isOnline ? '🟢 You are Online' : '🔴 You are Offline';
  if (DB_USER) {
    db.collection('delivery_boys').doc(DB_USER.uid).set({
      online: isOnline, email: DB_USER.email,
      gps: GPS.lat ? { lat: GPS.lat, lng: GPS.lng } : null,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
  }
}

function startGPS() {
  if (!navigator.geolocation) {
    document.getElementById('gpsStatus').textContent = '📍 GPS Not Supported';
    return;
  }
  navigator.geolocation.getCurrentPosition(pos => {
    GPS = { lat: pos.coords.latitude.toFixed(6), lng: pos.coords.longitude.toFixed(6) };
    document.getElementById('gpsStatus').textContent = '📍 GPS Active';
    document.getElementById('gpsCoords').textContent = `${GPS.lat}, ${GPS.lng}`;
    if (DB_USER) {
      db.collection('delivery_boys').doc(DB_USER.uid).set({
        gps: GPS, email: DB_USER.email, updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
    }
  }, () => {
    document.getElementById('gpsStatus').textContent = '📍 GPS Error — Allow location';
  });
}

function switchDTab(tab) {
  currentDTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('dtab-' + tab).classList.add('active');
  renderOrders();
}

let _allOrders = [];
function listenOrders() {
  if (unsubOrders) unsubOrders();
  // Listen to orders assigned to this delivery boy OR all confirmed/dispatched orders
  unsubOrders = db.collection('orders')
    .where('status', 'in', ['confirmed', 'out_for_delivery', 'delivered'])
    .orderBy('createdAt', 'desc')
    .limit(50)
    .onSnapshot(snap => {
      _allOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderOrders();
      updateStats();
    }, err => console.error('Listen error:', err));
}

function updateStats() {
  const today = new Date().toDateString();
  document.getElementById('sAssigned').textContent = _allOrders.filter(o => o.status === 'confirmed').length;
  document.getElementById('sInProgress').textContent = _allOrders.filter(o => o.status === 'out_for_delivery').length;
  document.getElementById('sDelivered').textContent = _allOrders.filter(o =>
    o.status === 'delivered' && o.updatedAt && new Date(o.updatedAt.seconds*1000).toDateString() === today
  ).length;
}

function renderOrders() {
  let orders;
  if (currentDTab === 'assigned') orders = _allOrders.filter(o => o.status === 'confirmed');
  else if (currentDTab === 'inprogress') orders = _allOrders.filter(o => o.status === 'out_for_delivery');
  else orders = _allOrders.filter(o => o.status === 'delivered');

  const container = document.getElementById('ordersContainer');
  if (!orders.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">${currentDTab==='history'?'✅':'📭'}</div><div class="empty-title">${currentDTab==='history'?'No deliveries yet today':'No orders here'}</div></div>`;
    return;
  }

  container.innerHTML = '<div class="section-title">' +
    (currentDTab==='assigned'?'📦 Ready to Pick Up':currentDTab==='inprogress'?'🚀 Out for Delivery':'✅ Delivered') +
    ' (' + orders.length + ')</div>' +
    orders.map(o => {
      const dt = o.createdAt ? new Date(o.createdAt.seconds*1000).toLocaleString('en-IN',{dateStyle:'short',timeStyle:'short'}) : '—';
      const items = o.items ? o.items.map(i=>`${i.name} × ${i.qtyRaw||i.qty}`).join(', ') : o.summary || '—';
      const gpsLink = o.gps ? `https://maps.google.com/?q=${o.gps.lat},${o.gps.lng}` : '';
      const st = o.status;

      let actions = '';
      if (st === 'confirmed') {
        actions = `
          <button class="action-btn btn-start" onclick="updateOrderStatus('${o.id}','out_for_delivery')">🚀 Start Delivery</button>
          ${o.phone ? `<button class="action-btn btn-call" onclick="window.location.href='tel:+91${o.phone}'">📞 Call</button>` : ''}
        `;
      } else if (st === 'out_for_delivery') {
        actions = `
          <button class="action-btn btn-deliver" onclick="markDelivered('${o.id}')">✅ Mark Delivered</button>
          ${gpsLink ? `<button class="action-btn btn-map" onclick="window.open('${gpsLink}','_blank')">🗺 Map</button>` : ''}
          ${o.phone ? `<button class="action-btn btn-call" onclick="window.location.href='tel:+91${o.phone}'">📞 Call</button>` : ''}
        `;
      } else {
        actions = `<div style="text-align:center;font-size:12px;color:var(--green);font-weight:800;padding:6px">✅ Delivered</div>`;
      }

      return `<div class="order-card">
        <div class="order-card-header">
          <div>
            <div class="order-name">${o.name || o.userName || '—'}</div>
            <div class="order-phone">${o.phone || '—'} · ${o.location || '—'}</div>
            <div class="order-id">${dt} · ${o.id.substring(0,8)}</div>
          </div>
          <span class="badge badge-${st}">${st.replace(/_/g,' ')}</span>
        </div>
        <div class="order-body">
          <div class="order-items">${items}</div>
          ${o.address ? `<div class="order-address">📍 <span>${o.address}</span></div>` : ''}
          ${o.instructions ? `<div style="font-size:11px;color:var(--muted);margin-bottom:8px">📝 ${o.instructions}</div>` : ''}
          <div class="order-actions">${actions}</div>
        </div>
      </div>`;
    }).join('');
}

function updateOrderStatus(id, newStatus) {
  db.collection('orders').doc(id).update({
    status: newStatus,
    deliveryBoyId: DB_USER.uid,
    deliveryBoyEmail: DB_USER.email,
    deliveryGPS: GPS.lat ? GPS : null,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(e => alert('Error: ' + e.message));
}

function markDelivered(id) {
  if (!confirm('Mark this order as DELIVERED?')) return;
  updateOrderStatus(id, 'delivered');
  startGPS(); // refresh location on delivery
}
</script>
</body>
</html>
