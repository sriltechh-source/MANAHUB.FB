<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>SRICART Delivery</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#2d5016;--brand2:#4a8024;--brand3:#7cb518;
  --glass:rgba(255,255,255,0.08);--glass-border:rgba(255,255,255,0.15);
  --text:#fff;--text2:rgba(255,255,255,0.75);--text3:rgba(255,255,255,0.45);
  --green:#4ade80;--red:#f87171;--orange:#fb923c;--blue:#60a5fa;--yellow:#fbbf24;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0a1505 0%,#1a3008 40%,#0d1f10 70%,#0a1505 100%);
  min-height:100vh;color:var(--text);
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 20% 20%,rgba(45,80,22,0.3),transparent 60%),
             radial-gradient(ellipse at 80% 80%,rgba(74,128,36,0.2),transparent 60%);
  pointer-events:none;z-index:0;
}
*{position:relative;z-index:1}
input,button{font-family:inherit}

/* Login */
#loginScreen{display:none;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{width:100%;max-width:360px;padding:32px 24px;background:rgba(255,255,255,0.07);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,0.18);border-radius:24px;box-shadow:0 24px 80px rgba(0,0,0,0.5);text-align:center}
.login-logo{font-size:44px;margin-bottom:10px}
.login-title{font-size:22px;font-weight:900;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--text2);margin-bottom:24px}
.glass-input{width:100%;padding:13px 16px;margin-bottom:12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:12px;color:#fff;font-size:14px;outline:none;display:block;-webkit-appearance:none}
.glass-input::placeholder{color:rgba(255,255,255,0.4)}
.glass-input:focus{background:rgba(255,255,255,0.13);border-color:var(--brand3);box-shadow:0 0 0 3px rgba(124,181,24,0.2)}
.btn-green{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#2d5016,#4a8024);color:#fff;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(45,80,22,0.5)}
.login-err{font-size:12px;color:var(--red);margin-top:8px;min-height:16px}

/* Dashboard */
#dashboard{display:none;flex-direction:column;min-height:100vh}

/* Header */
.db-header{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.1);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.db-logo{font-size:18px;font-weight:900;color:#fff}
.db-logo span{color:var(--brand3)}
.db-email{font-size:10px;color:var(--text2);background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:4px 8px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-sm{padding:6px 12px;border-radius:8px;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.25);color:var(--red);font-size:11px;cursor:pointer;font-family:inherit}

/* GPS bar */
.gps-bar{background:rgba(45,80,22,0.3);backdrop-filter:blur(10px);border-bottom:1px solid rgba(124,181,24,0.2);padding:10px 16px;display:flex;align-items:center;gap:10px}
.gps-dot{width:10px;height:10px;border-radius:50%;background:var(--green);flex-shrink:0;animation:gpsPulse 2s infinite}
@keyframes gpsPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.gps-text{font-size:12px;color:var(--text2);flex:1}

/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 16px 8px}
.stat-card{background:rgba(255,255,255,0.07);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:12px;text-align:center}
.stat-num{font-size:24px;font-weight:900;line-height:1}
.stat-label{font-size:10px;color:var(--text2);margin-top:3px;font-weight:600}

/* Orders list */
.orders-list{padding:8px 16px 80px}
.section-title{font-size:13px;font-weight:800;color:var(--text2);padding:8px 0 6px;letter-spacing:.4px;text-transform:uppercase}

/* Order card */
.order-card{background:rgba(255,255,255,0.07);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.12);border-radius:16px;margin-bottom:10px;overflow:hidden}
.order-card.priority{border-color:rgba(251,146,60,0.4);background:rgba(251,146,60,0.06)}
.order-header{padding:14px 14px 10px;cursor:pointer}
.order-type-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.type-badge{font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px}
.tb-order{background:rgba(96,165,250,0.15);color:var(--blue)}
.tb-food{background:rgba(74,222,128,0.15);color:var(--green)}
.tb-booking{background:rgba(192,132,252,0.15);color:#c084fc}
.status-badge{font-size:10px;font-weight:800;padding:4px 10px;border-radius:999px;border:1px solid}
.sb-pending{background:rgba(251,146,60,0.15);border-color:rgba(251,146,60,0.3);color:var(--orange)}
.sb-confirmed{background:rgba(96,165,250,0.15);border-color:rgba(96,165,250,0.3);color:var(--blue)}
.sb-out_for_delivery{background:rgba(251,191,36,0.15);border-color:rgba(251,191,36,0.3);color:var(--yellow)}
.sb-packed{background:rgba(192,132,252,0.15);border-color:rgba(192,132,252,0.3);color:#c084fc}
.order-name{font-size:16px;font-weight:800;color:#fff;margin-bottom:3px}
.order-meta{font-size:11px;color:var(--text2);display:flex;gap:10px;flex-wrap:wrap;margin-bottom:4px}
.order-summary{font-size:12px;color:var(--text3)}

/* Order detail */
.order-detail{display:none;padding:0 14px 14px;border-top:1px solid rgba(255,255,255,0.08)}
.order-detail.open{display:block}
.detail-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:12px}
.detail-row:last-child{border-bottom:none}
.detail-key{color:var(--text3);font-weight:600}
.detail-val{color:var(--text2);text-align:right;max-width:200px;word-break:break-word}
.detail-val a{color:var(--green);text-decoration:none}
.detail-val.highlight{color:var(--green);font-weight:900;font-size:14px}

/* Action buttons */
.action-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.action-btn{padding:9px 14px;border-radius:10px;border:1px solid;font-size:12px;font-weight:800;cursor:pointer;transition:.2s;font-family:inherit;display:flex;align-items:center;gap:5px}
.ab-green{background:rgba(74,222,128,0.12);border-color:rgba(74,222,128,0.3);color:var(--green)}
.ab-yellow{background:rgba(251,191,36,0.12);border-color:rgba(251,191,36,0.3);color:var(--yellow)}
.ab-blue{background:rgba(96,165,250,0.12);border-color:rgba(96,165,250,0.3);color:var(--blue)}
.ab-wa{background:rgba(37,211,102,0.1);border-color:rgba(37,211,102,0.25);color:#25d366}
.ab-call{background:rgba(74,222,128,0.1);border-color:rgba(74,222,128,0.25);color:var(--green)}

/* Empty / loader */
.empty-state{text-align:center;padding:50px 20px;color:var(--text2)}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--brand3);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
#dbToast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(30,60,15,0.95);backdrop-filter:blur(20px);border:1px solid rgba(124,181,24,0.3);border-radius:12px;padding:12px 20px;font-size:13px;font-weight:700;color:#fff;z-index:9999;display:none;min-width:200px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🛵</div>
    <div class="login-title">SRICART Delivery</div>
    <div class="login-sub">Sign in with your delivery partner account</div>
    <input class="glass-input" type="email" id="dbEmail" placeholder="Email address" autocomplete="email"/>
    <input class="glass-input" type="password" id="dbPass" placeholder="Password"
      onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="btn-green" onclick="doLogin()">Sign In →</button>
    <div class="login-err" id="loginError"></div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="db-header">
    <div class="db-logo">SRI<span>CART</span> <span style="font-size:12px;color:var(--text2);font-weight:500">Delivery</span></div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="db-email" id="dbEmailDisplay">—</div>
      <button class="btn-sm" onclick="auth.signOut()">Out</button>
    </div>
  </div>

  <div class="gps-bar">
    <div class="gps-dot"></div>
    <div class="gps-text" id="gpsStatus">Getting location…</div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="statTotal" style="color:var(--blue)">0</div><div class="stat-label">All Orders</div></div>
    <div class="stat-card"><div class="stat-num" id="statActive" style="color:var(--orange)">0</div><div class="stat-label">Active</div></div>
    <div class="stat-card"><div class="stat-num" id="statDone" style="color:var(--green)">0</div><div class="stat-label">Done Today</div></div>
  </div>

  <div class="orders-list">
    <div class="section-title">📦 Assigned to You</div>
    <div id="ordersList">
      <div class="empty-state"><div class="spinner"></div><div style="margin-top:12px;color:rgba(255,255,255,0.5)">Loading orders…</div></div>
    </div>
  </div>
</div>

<div id="dbToast"></div>

<script>
const firebaseConfig={apiKey:"AIzaSyAp-g1syTD9Q8ZRgjdxQDbFF6D9l9zHISY",authDomain:"fir-v1-a695a.firebaseapp.com",projectId:"fir-v1-a695a",storageBucket:"fir-v1-a695a.firebasestorage.app",messagingSenderId:"50283321145",appId:"1:50283321145:web:94c4c204309c0914ff7ae8"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth(),db=firebase.firestore();

// ⚠️ ADD YOUR DELIVERY PARTNER EMAILS HERE
const DELIVERY_EMAILS=['rider1@sricart.in','rider2@sricart.in','delivery@sricart.in'];

let DB_USER=null,_unsub=null,GPS={lat:null,lng:null};

function doLogin(){
  const email=document.getElementById('dbEmail').value.trim();
  const pass=document.getElementById('dbPass').value;
  const err=document.getElementById('loginError');
  if(!email||!pass){err.textContent='Enter email and password';return;}
  err.textContent='';
  auth.signInWithEmailAndPassword(email,pass).catch(e=>{err.textContent=e.message;});
}

auth.onAuthStateChanged(user=>{
  if(user){
    if(!DELIVERY_EMAILS.includes(user.email)){
      auth.signOut();
      document.getElementById('loginError').textContent='Access denied. Authorised riders only.';
      document.getElementById('loginScreen').style.display='flex';
      document.getElementById('dashboard').style.display='none';
      DB_USER=null;return;
    }
    DB_USER=user;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('dashboard').style.display='flex';
    document.getElementById('dbEmailDisplay').textContent=user.email;
    startGPS();
    listenOrders();
  } else {
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('dashboard').style.display='none';
    if(_unsub){_unsub();_unsub=null;}
    DB_USER=null;
  }
});

function startGPS(){
  if(!navigator.geolocation){document.getElementById('gpsStatus').textContent='GPS not supported';return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    GPS={lat:pos.coords.latitude.toFixed(6),lng:pos.coords.longitude.toFixed(6)};
    document.getElementById('gpsStatus').textContent=`📍 ${GPS.lat}, ${GPS.lng}`;
    if(DB_USER) db.collection('delivery_riders').doc(DB_USER.uid).set(
      {gps:GPS,lastSeen:firebase.firestore.FieldValue.serverTimestamp(),email:DB_USER.email},
      {merge:true}
    );
  },()=>{document.getElementById('gpsStatus').textContent='Location unavailable';},{enableHighAccuracy:true});
}

function listenOrders(){
  if(_unsub){_unsub();_unsub=null;}
  // Listen to all active orders (assigned or unassigned)
  const q=db.collection('orders')
    .where('status','in',['pending','confirmed','packed','out_for_delivery'])
    .limit(50);
  const q2=db.collection('food_orders')
    .where('status','in',['pending','confirmed','packed','out_for_delivery'])
    .limit(30);

  let _orders=[],_food=[];
  function merge(){
    const all=[..._orders,..._food].sort((a,b)=>(b._ts||0)-(a._ts||0));
    updateStats(all);renderOrders(all);
  }
  const u1=q.onSnapshot(s=>{_orders=s.docs.map(d=>({id:d.id,_col:'orders',_type:'order',_ts:d.data().createdAt?.seconds||0,...d.data()}));merge();},e=>console.warn(e));
  const u2=q2.onSnapshot(s=>{_food=s.docs.map(d=>({id:d.id,_col:'food_orders',_type:'food_order',_ts:d.data().createdAt?.seconds||0,...d.data()}));merge();},e=>console.warn(e));
  _unsub=()=>{u1();u2();};
}

function updateStats(list){
  document.getElementById('statTotal').textContent=list.length;
  document.getElementById('statActive').textContent=list.filter(o=>['confirmed','packed','out_for_delivery'].includes(o.status)).length;
  document.getElementById('statDone').textContent=0; // Would need separate query for today's delivered
}

function renderOrders(list){
  const c=document.getElementById('ordersList');
  if(!list.length){
    c.innerHTML='<div class="empty-state"><div style="font-size:40px;margin-bottom:10px;opacity:.6">📭</div><div style="font-weight:700;margin-bottom:4px">No active orders</div><div style="font-size:12px;color:rgba(255,255,255,0.4)">All clear! New orders will appear here</div></div>';
    return;
  }
  c.innerHTML=list.map(o=>renderCard(o)).join('');
}

function renderCard(o){
  const st=o.status||'pending';
  const dt=o.createdAt?new Date(o.createdAt.seconds*1000).toLocaleString('en-IN',{dateStyle:'short',timeStyle:'short'}):o.createdDate||'—';
  const stBadges={pending:'sb-pending',confirmed:'sb-confirmed',packed:'sb-packed',out_for_delivery:'sb-out_for_delivery'};
  const stLabels={pending:'🆕 Pending',confirmed:'✅ Confirmed',packed:'📦 Packed',out_for_delivery:'🚀 Out for Delivery'};
  const typeMap={order:{l:'🛒 Store',c:'tb-order'},food_order:{l:'🍽️ Food',c:'tb-food'},booking:{l:'📋 Booking',c:'tb-booking'}};
  const ti=typeMap[o._type]||typeMap.order;
  const items=(o.items||[]).map(i=>i.name).join(', ').substring(0,60);
  const isPriority=st==='out_for_delivery';

  const actions=[];
  if(o.phone){
    const waT=encodeURIComponent(`Hi ${o.name||''}! I'm your SRICART delivery partner. I'll be delivering your order shortly.`);
    actions.push(`<a class="action-btn ab-wa" href="https://wa.me/91${o.phone}?text=${waT}" target="_blank">💬 WhatsApp</a>`);
    actions.push(`<a class="action-btn ab-call" href="tel:+91${o.phone}">📞 Call</a>`);
  }
  if(o.gpsMapLink) actions.push(`<a class="action-btn ab-blue" href="${o.gpsMapLink}" target="_blank">🗺️ Navigate</a>`);
  if(st==='confirmed') actions.push(`<button class="action-btn ab-yellow" onclick="updateStatus('${o.id}','${o._col}','packed')">📦 Mark Packed</button>`);
  if(st==='packed') actions.push(`<button class="action-btn ab-yellow" onclick="updateStatus('${o.id}','${o._col}','out_for_delivery')">🚀 Start Delivery</button>`);
  if(st==='out_for_delivery') actions.push(`<button class="action-btn ab-green" onclick="updateStatus('${o.id}','${o._col}','delivered')">🎉 Mark Delivered</button>`);

  return `<div class="order-card${isPriority?' priority':''}" id="dcard-${o.id}">
    <div class="order-header" onclick="toggleCard('${o.id}')">
      <div class="order-type-row">
        <span class="type-badge ${ti.c}">${ti.l}</span>
        <span class="status-badge ${stBadges[st]||'sb-pending'}">${stLabels[st]||st}</span>
      </div>
      <div class="order-name">${o.name||'—'}</div>
      <div class="order-meta">
        ${o.phone?`<span>📱 ${o.phone}</span>`:''}
        ${o.serviceArea||o.location?`<span>📍 ${o.serviceArea||o.location}</span>`:''}
        ${o.total>0?`<span style="color:var(--green);font-weight:800">₹${o.total}</span>`:''}
      </div>
      ${items?`<div class="order-summary">Items: ${items}</div>`:''}
    </div>
    <div class="order-detail" id="dbody-${o.id}">
      ${[
        ['Order ID',`<span style="font-family:monospace;font-size:11px">#${o.id.substring(0,12).toUpperCase()}</span>`],
        ['Date & Time',dt],
        ['Mobile',o.phone?`<a href="tel:+91${o.phone}">📱 ${o.phone}</a>`:'—'],
        ['Address',o.address||'—'],
        ['Location',o.serviceArea||o.location||'—'],
        o.restaurantName?['Restaurant','🍽️ '+o.restaurantName]:null,
        o.total>0?['Total Amount',`<span class="highlight">₹${o.total.toLocaleString('en-IN')}</span>`]:null,
        o.instructions?['Instructions','📝 '+o.instructions]:null,
        o.giftMsg?['Gift Message','🎁 '+o.giftMsg]:null,
        o.gpsMapLink?['Customer GPS',`<a href="${o.gpsMapLink}" target="_blank">📍 Open Map</a>`]:null,
      ].filter(Boolean).map(([k,v])=>`<div class="detail-row"><span class="detail-key">${k}</span><span class="detail-val">${v}</span></div>`).join('')}
      ${o.items?.length?`<div style="margin:10px 0;padding:10px;background:rgba(255,255,255,0.05);border-radius:10px;font-size:12px;color:var(--text2)">${o.items.map(i=>`<div style="display:flex;justify-content:space-between;padding:4px 0">
        <span>${i.name}</span><span style="color:var(--text3)">×${i.qty||i.qtyRaw||1} ${i.price>0?'₹'+i.price*((i.qty||i.qtyRaw||1)):''}</span>
      </div>`).join('')}</div>`:''}
      <div class="action-row">${actions.join('')}</div>
    </div>
  </div>`;
}

function toggleCard(id){document.getElementById('dbody-'+id)?.classList.toggle('open');}

function updateStatus(id,col,newStatus){
  const now=new Date().toISOString();
  db.collection(col).doc(id).update({
    status:newStatus,[`${newStatus}At`]:firebase.firestore.FieldValue.serverTimestamp(),
    updatedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAtISO:now,
    assignedRiderEmail:DB_USER?.email||'',
    statusHistory:firebase.firestore.FieldValue.arrayUnion({status:newStatus,time:now,by:'rider',riderEmail:DB_USER?.email||''})
  }).then(()=>toast('✅ Status: '+newStatus)).catch(e=>toast('❌ '+e.message));
}

function toast(msg){
  const t=document.getElementById('dbToast');
  if(!t)return;t.textContent=msg;t.style.display='block';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',3000);
}
</script>
</body>
</html>
