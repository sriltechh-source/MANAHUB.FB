<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>SRICART Admin</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#2d5016;--brand2:#4a8024;--brand3:#7cb518;
  --glass:rgba(255,255,255,0.08);--glass2:rgba(255,255,255,0.12);
  --glass-border:rgba(255,255,255,0.15);
  --bg-dark:#0a1505;--bg-mid:#1a3008;
  --text:#ffffff;--text2:rgba(255,255,255,0.75);--text3:rgba(255,255,255,0.45);
  --green:#4ade80;--red:#f87171;--orange:#fb923c;--blue:#60a5fa;--yellow:#fbbf24;--purple:#c084fc;
  --success:#22c55e;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0a1505 0%,#1a3008 40%,#0d1f10 70%,#0a1505 100%);
  min-height:100vh;color:var(--text);
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 20% 20%,rgba(45,80,22,0.3) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 80%,rgba(74,128,36,0.2) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}
*{position:relative;z-index:1}
input,select,textarea,button{font-family:inherit}

/* ── Glass mixin ── */
.glass{
  background:var(--glass);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  border-radius:16px;
}
.glass2{
  background:var(--glass2);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);
}

/* ── Login ── */
#loginScreen{
  display:none;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;
}
.login-card{
  width:100%;max-width:380px;padding:36px 28px;
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:24px;
  box-shadow:0 24px 80px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.1);
  text-align:center;
}
.login-logo{font-size:48px;margin-bottom:12px}
.login-title{font-size:24px;font-weight:900;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:28px}
.glass-input{
  width:100%;padding:13px 16px;margin-bottom:12px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:12px;color:#fff;font-size:14px;outline:none;display:block;
  transition:.2s;
}
.glass-input::placeholder{color:rgba(255,255,255,0.4)}
.glass-input:focus{background:rgba(255,255,255,0.13);border-color:var(--brand3);box-shadow:0 0 0 3px rgba(124,181,24,0.2)}
.btn-green{
  width:100%;padding:14px;border:none;border-radius:12px;
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  color:#fff;font-size:15px;font-weight:800;cursor:pointer;
  box-shadow:0 4px 20px rgba(45,80,22,0.5);transition:.2s;font-family:inherit;
}
.btn-green:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(45,80,22,0.6)}
.login-err{font-size:12px;color:#f87171;margin-top:8px;min-height:18px}

/* ── Dashboard layout ── */
#dashboard{display:none;flex-direction:column;min-height:100vh}

/* ── Header ── */
.admin-header{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.1);
  padding:0 20px;height:58px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.admin-logo{font-size:20px;font-weight:900;color:#fff;letter-spacing:-0.5px}
.admin-logo span{color:var(--brand3)}
.admin-badge{
  font-size:11px;color:var(--text2);
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
  border-radius:8px;padding:4px 10px;
}
.btn-logout{
  padding:6px 14px;border-radius:8px;
  background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.25);
  color:#f87171;font-size:12px;cursor:pointer;transition:.2s;font-family:inherit;
}
.btn-logout:hover{background:rgba(248,113,113,0.2)}

/* ── Stats ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px 20px 8px}
@media(max-width:600px){.stats-row{grid-template-columns:repeat(2,1fr)}}
.stat-card{
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.12);border-radius:14px;
  padding:14px;text-align:center;
  transition:.2s;
}
.stat-card:hover{background:rgba(255,255,255,0.1)}
.stat-num{font-size:28px;font-weight:900;line-height:1}
.stat-label{font-size:11px;color:var(--text2);margin-top:4px;font-weight:600}

/* ── Filter bar ── */
.filter-bar{display:flex;gap:10px;padding:8px 20px 10px;flex-wrap:wrap;align-items:center}
.glass-select{
  padding:9px 14px;border-radius:10px;
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);
  color:#fff;font-size:13px;cursor:pointer;outline:none;font-family:inherit;
}
.glass-select option{background:#1a3008;color:#fff}
.glass-search{
  flex:1;min-width:160px;padding:9px 14px;border-radius:10px;
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);
  color:#fff;font-size:13px;outline:none;font-family:inherit;
}
.glass-search::placeholder{color:rgba(255,255,255,0.4)}
.glass-search:focus,.glass-select:focus{border-color:var(--brand3);background:rgba(255,255,255,0.1)}

/* ── Status tabs ── */
.section-tabs{display:flex;gap:6px;padding:0 20px 12px;overflow-x:auto;scrollbar-width:none}
.section-tabs::-webkit-scrollbar{display:none}
.stab{
  flex-shrink:0;padding:7px 14px;border-radius:999px;font-size:12px;font-weight:700;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  color:var(--text2);cursor:pointer;white-space:nowrap;transition:.2s;font-family:inherit;
  display:flex;align-items:center;gap:5px;
}
.stab:hover{background:rgba(255,255,255,0.1);color:#fff}
.stab.active{background:var(--brand);border-color:var(--brand2);color:#fff;box-shadow:0 4px 14px rgba(45,80,22,0.4)}
.stab-count{background:rgba(255,255,255,0.2);border-radius:999px;padding:1px 7px;font-size:10px}

/* ── Orders ── */
.orders-container{padding:0 20px 80px}
.order-card{
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.1);border-radius:16px;
  margin-bottom:10px;overflow:hidden;transition:.2s;
}
.order-card:hover{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.18)}
.order-card-header{
  padding:14px 16px 12px;display:flex;justify-content:space-between;
  align-items:flex-start;gap:8px;cursor:pointer;
}
.order-type-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;margin-bottom:5px;
}
.otb-order{background:rgba(96,165,250,0.15);color:var(--blue)}
.otb-food{background:rgba(74,222,128,0.15);color:var(--green)}
.otb-booking{background:rgba(192,132,252,0.15);color:var(--purple)}
.order-id{font-size:10px;color:var(--text3);font-family:monospace;margin-bottom:3px}
.order-customer{font-size:15px;font-weight:800;color:#fff;margin-bottom:3px}
.order-meta{font-size:11px;color:var(--text2);display:flex;flex-wrap:wrap;gap:8px}
.order-total{font-size:16px;font-weight:900;color:var(--green)}

/* ── Status pill ── */
.status-pill{padding:4px 10px;border-radius:999px;font-size:10px;font-weight:800;border:1px solid;white-space:nowrap}
.sp-pending{background:rgba(251,146,60,0.15);border-color:rgba(251,146,60,0.3);color:var(--orange)}
.sp-confirmed{background:rgba(96,165,250,0.15);border-color:rgba(96,165,250,0.3);color:var(--blue)}
.sp-packed{background:rgba(192,132,252,0.15);border-color:rgba(192,132,252,0.3);color:var(--purple)}
.sp-out_for_delivery{background:rgba(251,191,36,0.15);border-color:rgba(251,191,36,0.3);color:var(--yellow)}
.sp-delivered{background:rgba(74,222,128,0.15);border-color:rgba(74,222,128,0.3);color:var(--green)}
.sp-cancelled{background:rgba(248,113,113,0.15);border-color:rgba(248,113,113,0.3);color:var(--red)}
.sp-completed{background:rgba(74,222,128,0.15);border-color:rgba(74,222,128,0.3);color:var(--green)}

/* ── Order body ── */
.order-card-body{padding:0 16px 16px;display:none}
.order-card-body.open{display:block;border-top:1px solid rgba(255,255,255,0.08)}

/* ── Detail grid ── */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
@media(max-width:480px){.detail-grid{grid-template-columns:1fr}}
.detail-cell{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 12px}
.detail-cell.full{grid-column:1/-1}
.dc-label{font-size:9px;color:var(--text3);font-weight:700;letter-spacing:.6px;margin-bottom:4px;text-transform:uppercase}
.dc-value{font-size:13px;color:var(--text);font-weight:600;word-break:break-word}
.dc-value a{color:var(--green);text-decoration:none}

/* ── Items table ── */
.items-table{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0}
.items-table th{background:rgba(255,255,255,0.05);padding:7px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.4px;text-transform:uppercase}
.items-table td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.06);color:var(--text2)}
.items-table tr:last-child td{border-bottom:none;font-weight:800;color:var(--green)}

/* ── Actions ── */
.action-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.08)}
.action-btn{padding:8px 14px;border-radius:10px;border:1px solid;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;transition:.2s;font-family:inherit}
.action-btn:hover{transform:translateY(-1px)}
.ab-confirm{background:rgba(96,165,250,0.12);border-color:rgba(96,165,250,0.3);color:var(--blue)}
.ab-pack{background:rgba(192,132,252,0.12);border-color:rgba(192,132,252,0.3);color:var(--purple)}
.ab-dispatch{background:rgba(251,191,36,0.12);border-color:rgba(251,191,36,0.3);color:var(--yellow)}
.ab-deliver{background:rgba(74,222,128,0.12);border-color:rgba(74,222,128,0.3);color:var(--green)}
.ab-cancel{background:rgba(248,113,113,0.08);border-color:rgba(248,113,113,0.25);color:var(--red)}
.ab-wa{background:rgba(37,211,102,0.1);border-color:rgba(37,211,102,0.25);color:#25d366}
.ab-call{background:rgba(74,222,128,0.1);border-color:rgba(74,222,128,0.25);color:var(--green)}
.assign-row{display:flex;gap:8px;margin-top:10px;align-items:center}
.assign-input{flex:1;padding:9px 12px;border-radius:10px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:#fff;font-size:12px;outline:none;font-family:inherit}
.assign-input::placeholder{color:rgba(255,255,255,0.4)}
.assign-input:focus{border-color:var(--brand3)}

/* ── Timeline ── */
.timeline{display:flex;align-items:center;margin:14px 0;overflow-x:auto;padding-bottom:4px}
.tl-step{display:flex;flex-direction:column;align-items:center;min-width:60px}
.tl-dot{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:12px;transition:.3s}
.tl-dot.done{border-color:currentColor;background:currentColor}
.tl-dot.done span{filter:brightness(0) invert(1);font-size:12px}
.tl-label{font-size:9px;color:var(--text3);margin-top:4px;text-align:center;line-height:1.2;max-width:58px}
.tl-label.done{color:var(--text2)}
.tl-line{flex:1;height:2px;background:rgba(255,255,255,0.1);min-width:10px;margin-bottom:24px}
.tl-line.done{background:var(--green)}

/* ── Empty / Loader ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:0.7}
.empty-title{font-size:16px;font-weight:700;margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--text3)}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--brand3);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Toast ── */
#adminToast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:rgba(30,60,15,0.95);backdrop-filter:blur(20px);
  border:1px solid rgba(124,181,24,0.3);border-radius:12px;
  padding:12px 20px;font-size:13px;font-weight:700;color:#fff;
  z-index:9999;display:none;min-width:220px;text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🛒</div>
    <div class="login-title">SRICART Admin</div>
    <div class="login-sub">Sign in to manage orders & deliveries</div>
    <input class="glass-input" type="email" id="adminEmail" placeholder="Admin email" autocomplete="email"/>
    <input class="glass-input" type="password" id="adminPass" placeholder="Password"
      onkeydown="if(event.key==='Enter')doAdminLogin()"/>
    <button class="btn-green" onclick="doAdminLogin()">Sign In →</button>
    <div class="login-err" id="loginError"></div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">

  <!-- Header -->
  <div class="admin-header">
    <div class="admin-logo">SRI<span>CART</span></div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="admin-badge" id="adminEmailDisplay">—</div>
      <button class="btn-logout" onclick="auth.signOut()">Sign Out</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="statTotal" style="color:var(--blue)">0</div><div class="stat-label">Total Orders</div></div>
    <div class="stat-card"><div class="stat-num" id="statNew" style="color:var(--orange)">0</div><div class="stat-label">New / Pending</div></div>
    <div class="stat-card"><div class="stat-num" id="statActive" style="color:var(--purple)">0</div><div class="stat-label">In Progress</div></div>
    <div class="stat-card"><div class="stat-num" id="statDelivered" style="color:var(--green)">0</div><div class="stat-label">Delivered</div></div>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <select class="glass-select" id="locFilter" onchange="applyFilters()">
      <option value="All">📍 All Locations</option>
      <option value="Khanapur">Khanapur</option>
      <option value="Bhainsa">Bhainsa</option>
      <option value="Nirmal">Nirmal</option>
      <option value="Mudhole">Mudhole</option>
      <option value="Dilawarpur">Dilawarpur</option>
      <option value="Narsapur">Narsapur</option>
    </select>
    <select class="glass-select" id="typeFilter" onchange="applyFilters()">
      <option value="all">All Types</option>
      <option value="order">🛒 Store Orders</option>
      <option value="food_order">🍽️ Food Orders</option>
      <option value="booking">📋 Bookings</option>
    </select>
    <input class="glass-search" id="searchInput" placeholder="🔍 Search name, phone, ID…" oninput="applyFilters()"/>
  </div>

  <!-- Status Tabs -->
  <div class="section-tabs">
    <button class="stab active" data-status="all"              onclick="setTab(this)">🗂 All <span class="stab-count" id="tc-all">0</span></button>
    <button class="stab"        data-status="pending"          onclick="setTab(this)">🆕 New <span class="stab-count" id="tc-pending">0</span></button>
    <button class="stab"        data-status="confirmed"        onclick="setTab(this)">✅ Confirmed <span class="stab-count" id="tc-confirmed">0</span></button>
    <button class="stab"        data-status="packed"           onclick="setTab(this)">📦 Packed <span class="stab-count" id="tc-packed">0</span></button>
    <button class="stab"        data-status="out_for_delivery" onclick="setTab(this)">🚀 Out for Delivery <span class="stab-count" id="tc-out_for_delivery">0</span></button>
    <button class="stab"        data-status="delivered"        onclick="setTab(this)">🎉 Delivered <span class="stab-count" id="tc-delivered">0</span></button>
    <button class="stab"        data-status="cancelled"        onclick="setTab(this)">❌ Cancelled <span class="stab-count" id="tc-cancelled">0</span></button>
  </div>

  <!-- Orders List -->
  <div class="orders-container" id="ordersContainer">
    <div class="empty-state"><div class="spinner"></div><div style="margin-top:14px;color:rgba(255,255,255,0.6)">Loading orders…</div></div>
  </div>
</div>

<div id="adminToast"></div>

<script>
const firebaseConfig={apiKey:"AIzaSyAp-g1syTD9Q8ZRgjdxQDbFF6D9l9zHISY",authDomain:"fir-v1-a695a.firebaseapp.com",projectId:"fir-v1-a695a",storageBucket:"fir-v1-a695a.firebasestorage.app",messagingSenderId:"50283321145",appId:"1:50283321145:web:94c4c204309c0914ff7ae8"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth(), db=firebase.firestore();

// ⚠️ ADD YOUR ADMIN EMAIL(S) HERE
const ADMIN_EMAILS=['sriltechh@gmail.com','sricartadmin@gmail.com'];

function doAdminLogin(){
  const email=document.getElementById('adminEmail').value.trim();
  const pass=document.getElementById('adminPass').value;
  const err=document.getElementById('loginError');
  if(!email||!pass){err.textContent='Enter email and password';return;}
  err.textContent='';
  auth.signInWithEmailAndPassword(email,pass).catch(e=>{err.textContent=e.message;});
}

auth.onAuthStateChanged(user=>{
  if(user){
    if(!ADMIN_EMAILS.includes(user.email)){
      auth.signOut();
      document.getElementById('loginError').textContent='Access denied. Admins only.';
      document.getElementById('loginScreen').style.display='flex';
      document.getElementById('dashboard').style.display='none';
      return;
    }
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('dashboard').style.display='flex';
    document.getElementById('adminEmailDisplay').textContent=user.email;
    startListeners();
  } else {
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('dashboard').style.display='none';
    stopListeners();
  }
});

let _allOrders=[],_unsubs=[],_activeStatus='all';

function startListeners(){
  stopListeners();
  let _o=[],_b=[],_f=[];
  function merge(){
    _allOrders=[..._o,..._b,..._f].sort((a,b)=>(b._ts||0)-(a._ts||0));
    updateStats();applyFilters();
  }
  const u1=db.collection('orders').orderBy('createdAt','desc').limit(200)
    .onSnapshot(s=>{_o=s.docs.map(d=>({id:d.id,_col:'orders',_type:'order',_ts:d.data().createdAt?.seconds||0,...d.data()}));merge();},e=>console.warn(e));
  const u2=db.collection('bookings').orderBy('createdAt','desc').limit(200)
    .onSnapshot(s=>{_b=s.docs.map(d=>({id:d.id,_col:'bookings',_type:'booking',_ts:d.data().createdAt?.seconds||0,...d.data()}));merge();},e=>console.warn(e));
  const u3=db.collection('food_orders').orderBy('createdAt','desc').limit(200)
    .onSnapshot(s=>{_f=s.docs.map(d=>({id:d.id,_col:'food_orders',_type:'food_order',_ts:d.data().createdAt?.seconds||0,...d.data()}));merge();},e=>console.warn(e));
  _unsubs=[u1,u2,u3];
}
function stopListeners(){_unsubs.forEach(u=>u&&u());_unsubs=[];}

function updateStats(){
  const c={all:0,pending:0,confirmed:0,packed:0,out_for_delivery:0,delivered:0,cancelled:0,completed:0};
  _allOrders.forEach(o=>{c.all++;const s=o.status||'pending';if(c[s]!==undefined)c[s]++;});
  document.getElementById('statTotal').textContent=c.all;
  document.getElementById('statNew').textContent=c.pending||0;
  document.getElementById('statActive').textContent=(c.confirmed||0)+(c.packed||0)+(c.out_for_delivery||0);
  document.getElementById('statDelivered').textContent=(c.delivered||0)+(c.completed||0);
  Object.keys(c).forEach(k=>{const el=document.getElementById('tc-'+k);if(el)el.textContent=c[k];});
}

function setTab(el){
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');_activeStatus=el.dataset.status;applyFilters();
}

function applyFilters(){
  const loc=document.getElementById('locFilter')?.value||'All';
  const type=document.getElementById('typeFilter')?.value||'all';
  const search=(document.getElementById('searchInput')?.value||'').toLowerCase();
  let list=_allOrders;
  if(_activeStatus!=='all')list=list.filter(o=>(o.status||'pending')===_activeStatus);
  if(loc!=='All')list=list.filter(o=>(o.serviceArea||o.location||o.restaurantLocation||'').toLowerCase()===loc.toLowerCase());
  if(type!=='all')list=list.filter(o=>o._type===type);
  if(search)list=list.filter(o=>(o.name||'').toLowerCase().includes(search)||(o.phone||'').includes(search)||(o.id||'').toLowerCase().includes(search)||(o.restaurantName||'').toLowerCase().includes(search));
  renderOrders(list);
}

function renderOrders(list){
  const c=document.getElementById('ordersContainer');
  if(!list.length){c.innerHTML='<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">No orders found</div><div class="empty-sub">Try changing filters or wait for new orders</div></div>';return;}
  c.innerHTML=list.map(o=>renderCard(o)).join('');
}

function renderCard(o){
  const st=o.status||'pending';
  const isCancelled=st==='cancelled';
  const dt=o.createdAt?new Date(o.createdAt.seconds*1000).toLocaleString('en-IN',{dateStyle:'medium',timeStyle:'short'}):o.createdDate||'—';
  const stLabels={pending:'🆕 Pending',confirmed:'✅ Confirmed',packed:'📦 Packed',out_for_delivery:'🚀 Out for Delivery',delivered:'🎉 Delivered',cancelled:'❌ Cancelled',completed:'✅ Completed',request_sent:'📝 Sent'};
  const typeMap={order:{l:'🛒 Store Order',c:'otb-order'},food_order:{l:'🍽️ Food Order',c:'otb-food'},booking:{l:'📋 Booking',c:'otb-booking'}};
  const ti=typeMap[o._type]||typeMap.order;

  const TL_STEPS={order:['pending','confirmed','packed','out_for_delivery','delivered'],food_order:['pending','confirmed','packed','out_for_delivery','delivered'],booking:['pending','confirmed','completed']};
  const TL_LABELS={pending:'Placed',confirmed:'Confirmed',packed:'Packed',out_for_delivery:'On the Way',delivered:'Delivered',completed:'Done'};
  const TL_ICONS={pending:'📝',confirmed:'✅',packed:'📦',out_for_delivery:'🚀',delivered:'🎉',completed:'🎉'};
  const TL_COLORS={pending:'#fb923c',confirmed:'#60a5fa',packed:'#c084fc',out_for_delivery:'#fbbf24',delivered:'#4ade80',completed:'#4ade80'};
  const steps=TL_STEPS[o._type]||TL_STEPS.order;
  const curIdx=steps.indexOf(st);

  const tlHtml=isCancelled?`<div style="color:#f87171;font-size:12px;font-weight:700;padding:8px 0">✖ Cancelled</div>`:
    `<div class="timeline">${steps.map((s,i)=>{
      const done=i<=curIdx;const col=TL_COLORS[s]||'#4ade80';
      return `<div class="tl-step"><div class="tl-dot${done?' done':''}" style="${done?`color:${col}`:''}"><span>${done?TL_ICONS[s]:'·'}</span></div><div class="tl-label${done?' done':''}" style="${done?`color:${col}`:''}"> ${TL_LABELS[s]}${done&&o[s+'At']?`<br><span style="font-size:8px">${new Date(o[s+'At'].seconds*1000).toLocaleTimeString('en-IN',{timeStyle:'short'})}</span>`:''}</div></div>${i<steps.length-1?`<div class="tl-line${i<curIdx?' done':''}"></div>`:''}`
    }).join('')}</div>`;

  const itemsHtml=o.items?.length?`<table class="items-table"><thead><tr><th>Item</th><th>Qty</th><th>Total</th></tr></thead><tbody>${o.items.map(i=>`<tr><td>${o._type==='food_order'?`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${i.veg?'#4ade80':'#f87171'};margin-right:5px"></span>`:''}${i.name}</td><td>${i.qty||i.qtyRaw||1}</td><td>${i.total>0?'₹'+i.total:'—'}</td></tr>`).join('')}${o.total>0?`<tr><td colspan="2">Grand Total</td><td>₹${o.total.toLocaleString('en-IN')}</td></tr>`:''}</tbody></table>`:'';

  const isB=o._type==='booking';
  const actionBtns=[];
  if(o.phone){
    const waT=encodeURIComponent(`Hi ${o.name||'Customer'}! SRICART order update #${o.id.substring(0,8)}:`);
    actionBtns.push(`<a class="action-btn ab-wa" href="https://wa.me/91${o.phone}?text=${waT}" target="_blank">💬 WhatsApp</a>`);
    actionBtns.push(`<a class="action-btn ab-call" href="tel:+91${o.phone}">📞 Call</a>`);
  }
  if(!['cancelled','delivered','completed'].includes(st)){
    if(['pending','request_sent'].includes(st)) actionBtns.push(`<button class="action-btn ab-confirm" onclick="updateStatus('${o.id}','${o._col}','confirmed')">✅ Confirm</button>`);
    if(st==='confirmed'&&!isB) actionBtns.push(`<button class="action-btn ab-pack" onclick="updateStatus('${o.id}','${o._col}','packed')">📦 Pack</button>`);
    if(st==='packed') actionBtns.push(`<button class="action-btn ab-dispatch" onclick="updateStatus('${o.id}','${o._col}','out_for_delivery')">🚀 Dispatch</button>`);
    if(['packed','out_for_delivery','confirmed'].includes(st)) actionBtns.push(`<button class="action-btn ab-deliver" onclick="updateStatus('${o.id}','${o._col}','${isB?'completed':'delivered'}')">🎉 ${isB?'Complete':'Delivered'}</button>`);
    actionBtns.push(`<button class="action-btn ab-cancel" onclick="cancelOrder('${o.id}','${o._col}')">❌ Cancel</button>`);
  }

  return `<div class="order-card" id="card-${o.id}">
    <div class="order-card-header" onclick="toggleCard('${o.id}')">
      <div style="flex:1;min-width:0">
        <div><span class="order-type-badge ${ti.c}">${ti.l}</span></div>
        <div class="order-id">#${o.id.substring(0,12).toUpperCase()} · ${dt}</div>
        <div class="order-customer">${o.name||'—'}</div>
        <div class="order-meta">
          ${o.phone?`<span>📱 ${o.phone}</span>`:''}
          ${o.serviceArea||o.location?`<span>📍 ${o.serviceArea||o.location}</span>`:''}
          ${o.restaurantName?`<span>🍽️ ${o.restaurantName}</span>`:''}
          ${o.items?.length?`<span>📦 ${o.items.length} item(s)</span>`:''}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
        <div class="status-pill sp-${st}">${stLabels[st]||st}</div>
        ${o.total>0?`<div class="order-total">₹${o.total.toLocaleString('en-IN')}</div>`:''}
      </div>
    </div>
    <div class="order-card-body" id="body-${o.id}">
      ${tlHtml}
      <div class="detail-grid">
        <div class="detail-cell"><div class="dc-label">Order ID</div><div class="dc-value" style="font-family:monospace;font-size:11px">${o.id}</div></div>
        <div class="detail-cell"><div class="dc-label">Date & Time</div><div class="dc-value">${dt}</div></div>
        ${o.name?`<div class="detail-cell"><div class="dc-label">Customer</div><div class="dc-value">${o.name}</div></div>`:''}
        ${o.phone?`<div class="detail-cell"><div class="dc-label">Mobile</div><div class="dc-value"><a href="tel:+91${o.phone}">📱 ${o.phone}</a></div></div>`:''}
        ${o.userEmail?`<div class="detail-cell full"><div class="dc-label">Email</div><div class="dc-value">${o.userEmail}</div></div>`:''}
        ${o.address?`<div class="detail-cell full"><div class="dc-label">Delivery Address</div><div class="dc-value">📍 ${o.address}</div></div>`:''}
        ${o.serviceArea||o.location?`<div class="detail-cell"><div class="dc-label">Service Area</div><div class="dc-value">${o.serviceArea||o.location}</div></div>`:''}
        ${o.restaurantName?`<div class="detail-cell"><div class="dc-label">Restaurant</div><div class="dc-value">🍽️ ${o.restaurantName}</div></div>`:''}
        ${o.total>0?`<div class="detail-cell"><div class="dc-label">Total Amount</div><div class="dc-value" style="color:var(--green);font-size:18px;font-weight:900">₹${o.total.toLocaleString('en-IN')}</div></div>`:''}
        ${o.assignedRiderName?`<div class="detail-cell"><div class="dc-label">Assigned Rider</div><div class="dc-value" style="color:var(--purple)">🛵 ${o.assignedRiderName}</div></div>`:''}
        ${o.instructions?`<div class="detail-cell full"><div class="dc-label">Instructions</div><div class="dc-value">📝 ${o.instructions}</div></div>`:''}
        ${o.gpsMapLink?`<div class="detail-cell full"><div class="dc-label">GPS Location</div><div class="dc-value"><a href="${o.gpsMapLink}" target="_blank">🗺️ Open in Google Maps</a></div></div>`:''}
      </div>
      ${itemsHtml}
      ${o._type==='booking'&&o.fields?`<div style="margin:10px 0">${Object.entries(o.fields).map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.07);font-size:12px"><span style="color:var(--text3)">${k}</span><span style="color:var(--text2)">${v}</span></div>`).join('')}</div>`:''}
      <div class="action-row">${actionBtns.join('')}</div>
      ${!['delivered','cancelled','completed'].includes(st)?`<div class="assign-row"><input class="assign-input" id="rider-${o.id}" placeholder="🛵 Rider name" value="${o.assignedRiderName||''}"/><button class="action-btn ab-dispatch" onclick="assignRider('${o.id}','${o._col}')">Assign</button></div>`:''}
    </div>
  </div>`;
}

function toggleCard(id){document.getElementById('body-'+id)?.classList.toggle('open');}

function updateStatus(id,col,newStatus){
  const now=new Date().toISOString();
  db.collection(col).doc(id).update({
    status:newStatus,[`${newStatus}At`]:firebase.firestore.FieldValue.serverTimestamp(),
    updatedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAtISO:now,
    statusHistory:firebase.firestore.FieldValue.arrayUnion({status:newStatus,time:now,by:'admin'})
  }).then(()=>toast(`✅ Status: ${newStatus}`)).catch(e=>toast('❌ '+e.message));
}

function cancelOrder(id,col){if(!confirm('Cancel this order?'))return;updateStatus(id,col,'cancelled');}

function assignRider(id,col){
  const name=(document.getElementById('rider-'+id)?.value||'').trim();
  if(!name){toast('Enter rider name first');return;}
  db.collection(col).doc(id).update({assignedRiderName:name,assignedAt:firebase.firestore.FieldValue.serverTimestamp()})
    .then(()=>toast('🛵 Rider: '+name)).catch(e=>toast('❌ '+e.message));
}

function toast(msg){
  const t=document.getElementById('adminToast');
  if(!t)return;t.textContent=msg;t.style.display='block';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',3000);
}
</script>
</body>
</html>
