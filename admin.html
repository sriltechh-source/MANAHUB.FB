<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Mana Hub — Admin Dashboard</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{--brand:#2D5016;--brand2:#4a7c28;--bg:#f5f7f2;--card:#fff;--border:#e0e0e0;--text:#1a1a1a;--muted:#888;--red:#c0392b;--blue:#1565c0;--green:#2e7d32;--orange:#e65100}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.18)}
.header-title{font-size:18px;font-weight:900}
.header-sub{font-size:11px;opacity:.85}
.logout-btn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:var(--card);border-radius:16px;padding:32px;max-width:380px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.10)}
.login-logo{text-align:center;font-size:48px;margin-bottom:12px}
.login-title{text-align:center;font-size:22px;font-weight:900;color:var(--brand);margin-bottom:4px}
.login-sub{text-align:center;font-size:13px;color:var(--muted);margin-bottom:24px}
input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;outline:none;margin-bottom:12px}
input:focus{border-color:var(--brand)}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff}
.btn-secondary{background:var(--bg);border:1.5px solid var(--border);color:var(--text);margin-top:8px}
.error-msg{color:var(--red);font-size:12px;text-align:center;margin-top:8px;min-height:16px}
.dashboard{display:none}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;padding:16px 20px}
.stat-card{background:var(--card);border-radius:12px;padding:16px;border:1px solid var(--border);text-align:center}
.stat-num{font-size:28px;font-weight:900}
.stat-label{font-size:12px;color:var(--muted);margin-top:4px}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);padding:0 20px;overflow-x:auto}
.tab{padding:12px 18px;font-size:13px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;color:var(--muted)}
.tab.active{color:var(--brand);border-bottom-color:var(--brand)}
.content{padding:16px 20px}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filter-select{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--card);cursor:pointer}
.order-table{width:100%;border-collapse:collapse;background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.order-table th{background:var(--brand);color:#fff;padding:11px 12px;font-size:12px;text-align:left;font-weight:700}
.order-table td{padding:11px 12px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:top}
.order-table tr:last-child td{border-bottom:none}
.order-table tr:hover td{background:#f8fdf5}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:10px;font-weight:800}
.badge-pending{background:#fff3e0;color:var(--orange)}
.badge-confirmed{background:#e3f2fd;color:var(--blue)}
.badge-out_for_delivery{background:#e8eaf6;color:#3949ab}
.badge-delivered{background:#e8f5e9;color:var(--green)}
.badge-cancelled{background:#fce4ec;color:var(--red)}
.action-btn{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:800;cursor:pointer;border:none;margin:2px}
.btn-confirm{background:var(--blue);color:#fff}
.btn-dispatch{background:#7b1fa2;color:#fff}
.btn-deliver{background:var(--green);color:#fff}
.btn-cancel{background:var(--red);color:#fff}
.btn-assign{background:#e65100;color:#fff}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.no-data{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.details-expand{background:var(--bg);border-radius:8px;padding:8px 10px;margin-top:6px;font-size:11px;line-height:1.7;display:none}
.expand-toggle{cursor:pointer;color:var(--brand);font-size:11px;font-weight:700}
.refresh-btn{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:12px;font-weight:700;color:var(--text)}
.search-input{padding:9px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;width:200px;outline:none}
.search-input:focus{border-color:var(--brand)}
@media(max-width:600px){
  .order-table{font-size:11px}
  .order-table th,.order-table td{padding:8px 8px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🌿</div>
    <div class="login-title">Mana Hub Admin</div>
    <div class="login-sub">Sign in with your admin account</div>
    <input type="email" id="adminEmail" placeholder="Admin email" autocomplete="email"/>
    <input type="password" id="adminPass" placeholder="Password" autocomplete="current-password"/>
    <button class="btn btn-primary" onclick="adminLogin()">Sign In</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="header">
    <div>
      <div class="header-title">🌿 Mana Hub — Admin</div>
      <div class="header-sub" id="adminEmailDisplay"></div>
    </div>
    <button class="logout-btn" onclick="adminLogout()">Logout</button>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num" style="color:var(--orange)" id="statPending">—</div><div class="stat-label">Pending</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--blue)" id="statConfirmed">—</div><div class="stat-label">Confirmed</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#7b1fa2" id="statDispatched">—</div><div class="stat-label">Out for Delivery</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green)" id="statDelivered">—</div><div class="stat-label">Delivered</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--text)" id="statTotalOrders">—</div><div class="stat-label">Total Orders</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--brand)" id="statBookings">—</div><div class="stat-label">Bookings</div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" id="tab-orders" onclick="switchTab('orders')">📦 Orders</div>
    <div class="tab" id="tab-bookings" onclick="switchTab('bookings')">📋 Bookings</div>
    <div class="tab" id="tab-users" onclick="switchTab('users')">👤 Users</div>
  </div>

  <div class="content">
    <div class="filters">
      <select class="filter-select" id="statusFilter" onchange="applyFilters()">
        <option value="">All Status</option>
        <option value="pending">Pending</option>
        <option value="confirmed">Confirmed</option>
        <option value="out_for_delivery">Out for Delivery</option>
        <option value="delivered">Delivered</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <input class="search-input" id="searchInput" placeholder="Search name / phone..." oninput="applyFilters()"/>
      <button class="refresh-btn" onclick="loadCurrentTab()">🔄 Refresh</button>
    </div>
    <div id="tableContainer" class="loading">Loading data...</div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAp-g1syTD9Q8ZRgjdxQDbFF6D9l9zHISY",
  authDomain: "fir-v1-a695a.firebaseapp.com",
  projectId: "fir-v1-a695a",
  storageBucket: "fir-v1-a695a.firebasestorage.app",
  messagingSenderId: "50283321145",
  appId: "1:50283321145:web:94c4c204309c0914ff7ae8"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ADMIN EMAILS — add your admin emails here
const ADMIN_EMAILS = ['admin@manahub.in', 'manahubofficial@gmail.com'];

let currentTab = 'orders';
let allData = [];

auth.onAuthStateChanged(user => {
  if (user) {
    if (!ADMIN_EMAILS.includes(user.email)) {
      // Allow any logged-in user for now — restrict by adding emails to ADMIN_EMAILS
      // auth.signOut(); return;
    }
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('adminEmailDisplay').textContent = user.email;
    loadCurrentTab();
    loadStats();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
  }
});

function adminLogin() {
  const email = document.getElementById('adminEmail').value.trim();
  const pass = document.getElementById('adminPass').value;
  const err = document.getElementById('loginError');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'Enter email and password'; return; }
  auth.signInWithEmailAndPassword(email, pass)
    .catch(e => { err.textContent = e.message; });
}

function adminLogout() {
  auth.signOut();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('statusFilter').style.display = tab === 'users' ? 'none' : '';
  loadCurrentTab();
}

function loadCurrentTab() {
  document.getElementById('tableContainer').innerHTML = '<div class="loading">Loading...</div>';
  if (currentTab === 'orders') loadOrders();
  else if (currentTab === 'bookings') loadBookings();
  else loadUsers();
}

function loadStats() {
  db.collection('orders').get().then(snap => {
    const docs = snap.docs.map(d => d.data());
    document.getElementById('statPending').textContent = docs.filter(d=>d.status==='pending').length;
    document.getElementById('statConfirmed').textContent = docs.filter(d=>d.status==='confirmed').length;
    document.getElementById('statDispatched').textContent = docs.filter(d=>d.status==='out_for_delivery').length;
    document.getElementById('statDelivered').textContent = docs.filter(d=>d.status==='delivered').length;
    document.getElementById('statTotalOrders').textContent = docs.length;
  });
  db.collection('bookings').get().then(snap => {
    document.getElementById('statBookings').textContent = snap.size;
  });
}

function loadOrders() {
  db.collection('orders').orderBy('createdAt','desc').limit(100).get().then(snap => {
    allData = snap.docs.map(d => ({ id: d.id, _col: 'orders', ...d.data() }));
    renderTable();
  }).catch(e => {
    document.getElementById('tableContainer').innerHTML = `<div class="no-data">Error: ${e.message}</div>`;
  });
}

function loadBookings() {
  db.collection('bookings').orderBy('createdAt','desc').limit(100).get().then(snap => {
    allData = snap.docs.map(d => ({ id: d.id, _col: 'bookings', ...d.data() }));
    renderTable();
  }).catch(e => {
    document.getElementById('tableContainer').innerHTML = `<div class="no-data">Error: ${e.message}</div>`;
  });
}

function loadUsers() {
  db.collection('users').orderBy('createdAt','desc').limit(100).get().then(snap => {
    allData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderUsersTable();
  }).catch(() => {
    document.getElementById('tableContainer').innerHTML = '<div class="no-data">No user data</div>';
  });
}

function applyFilters() {
  if (currentTab === 'users') { renderUsersTable(); return; }
  renderTable();
}

function renderTable() {
  const statusF = document.getElementById('statusFilter').value;
  const searchF = document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered = allData;
  if (statusF) filtered = filtered.filter(d => d.status === statusF);
  if (searchF) filtered = filtered.filter(d =>
    (d.name||'').toLowerCase().includes(searchF) ||
    (d.phone||'').includes(searchF) ||
    (d.summary||'').toLowerCase().includes(searchF)
  );

  if (!filtered.length) {
    document.getElementById('tableContainer').innerHTML = '<div class="no-data">No records found</div>';
    return;
  }

  const isOrders = currentTab === 'orders';
  const rows = filtered.map(d => {
    const dt = d.createdAt ? new Date(d.createdAt.seconds*1000).toLocaleString('en-IN',{dateStyle:'short',timeStyle:'short'}) : '—';
    const st = d.status || 'pending';
    const summary = isOrders
      ? (d.items ? d.items.map(i=>`${i.name} × ${i.qtyRaw||i.qty}`).join('<br>') : d.summary||'')
      : (d.title || d.summary || d.bookingKey || '');
    const total = isOrders && d.total > 0 ? '₹' + d.total.toLocaleString('en-IN') : (isOrders ? 'Price on request' : '—');
    const fieldDetails = d.fields ? Object.entries(d.fields).map(([k,v])=>`<b>${k}:</b> ${v}`).join('<br>') : '';
    const gpsLink = d.gps ? `<a href="https://maps.google.com/?q=${d.gps.lat},${d.gps.lng}" target="_blank" style="color:var(--brand);font-size:10px">📍 Map</a>` : '';

    const actions = isOrders ? `
      ${st==='pending' ? `<button class="action-btn btn-confirm" onclick="updateStatus('${d.id}','${d._col}','confirmed')">Confirm</button>` : ''}
      ${st==='confirmed' ? `<button class="action-btn btn-dispatch" onclick="updateStatus('${d.id}','${d._col}','out_for_delivery')">Dispatch</button>` : ''}
      ${st==='out_for_delivery' ? `<button class="action-btn btn-deliver" onclick="updateStatus('${d.id}','${d._col}','delivered')">Delivered</button>` : ''}
      ${st!=='cancelled'&&st!=='delivered' ? `<button class="action-btn btn-cancel" onclick="updateStatus('${d.id}','${d._col}','cancelled')">Cancel</button>` : ''}
    ` : `
      ${st==='pending' ? `<button class="action-btn btn-confirm" onclick="updateStatus('${d.id}','${d._col}','confirmed')">Confirm</button>` : ''}
      ${st==='confirmed' ? `<button class="action-btn btn-deliver" onclick="updateStatus('${d.id}','${d._col}','completed')">Complete</button>` : ''}
      ${st!=='cancelled'&&st!=='completed' ? `<button class="action-btn btn-cancel" onclick="updateStatus('${d.id}','${d._col}','cancelled')">Cancel</button>` : ''}
    `;

    return `<tr>
      <td style="font-size:10px;color:var(--muted)">${d.id.substring(0,8)}<br>${dt}</td>
      <td><b>${d.name||d.userName||'—'}</b><br>${d.phone||''}<br>${gpsLink}</td>
      <td>${d.location||'—'}</td>
      <td>${summary}<br><span class="expand-toggle" onclick="toggleDetails('det-${d.id}')">▼ Details</span><div class="details-expand" id="det-${d.id}">${d.address||''}<br>${fieldDetails}</div></td>
      <td><b>${total}</b></td>
      <td><span class="badge badge-${st}">${st.replace(/_/g,' ')}</span></td>
      <td>${actions}</td>
    </tr>`;
  }).join('');

  document.getElementById('tableContainer').innerHTML = `
    <div style="overflow-x:auto">
    <table class="order-table">
      <thead><tr>
        <th>ID / Date</th><th>Customer</th><th>Area</th>
        <th>${isOrders?'Items':'Service'}</th><th>Amount</th><th>Status</th><th>Actions</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

function renderUsersTable() {
  const searchF = document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered = allData;
  if (searchF) filtered = filtered.filter(d =>
    (d.name||'').toLowerCase().includes(searchF) ||
    (d.email||'').toLowerCase().includes(searchF) ||
    (d.phone||'').includes(searchF)
  );
  if (!filtered.length) { document.getElementById('tableContainer').innerHTML = '<div class="no-data">No users found</div>'; return; }
  const rows = filtered.map(d => {
    const dt = d.createdAt ? new Date(d.createdAt.seconds*1000).toLocaleDateString('en-IN') : '—';
    return `<tr>
      <td style="font-size:10px;color:var(--muted)">${d.id.substring(0,8)}</td>
      <td><b>${d.name||'—'}</b></td>
      <td>${d.email||'—'}</td>
      <td>${d.phone||'—'}</td>
      <td>${dt}</td>
    </tr>`;
  }).join('');
  document.getElementById('tableContainer').innerHTML = `
    <div style="overflow-x:auto">
    <table class="order-table">
      <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Joined</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

function updateStatus(id, col, newStatus) {
  db.collection(col).doc(id).update({ status: newStatus, updatedAt: firebase.firestore.FieldValue.serverTimestamp() })
    .then(() => { loadCurrentTab(); loadStats(); })
    .catch(e => alert('Error: ' + e.message));
}

function toggleDetails(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = el.style.display === 'block' ? 'none' : 'block';
}
</script>
</body>
</html>
